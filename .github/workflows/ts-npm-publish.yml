# Publish packages to npm when tagged
# - ts/antfly/sdk/v* tags publish @antfly/sdk
# - ts/antfly/components/v* tags publish @antfly/components
#
# Uses npm Trusted Publishing (OIDC) - no secrets required.
# Configure trusted publishers at: https://www.npmjs.com/package/@antfly/sdk/access
# and https://www.npmjs.com/package/@antfly/components/access

name: Publish to npm

on:
  push:
    tags:
      - 'ts/antfly/sdk/v*'
      - 'ts/antfly/components/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # Required for npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
          cache-dependency-path: ts/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ts
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        working-directory: ts
        run: pnpm build --force

      - name: Run tests
        working-directory: ts
        run: pnpm test

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish SDK
        if: startsWith(github.ref, 'refs/tags/ts/antfly/sdk/v')
        working-directory: ts
        run: pnpm --filter @antfly/sdk publish --access public --no-git-checks --provenance

      - name: Publish Components
        if: startsWith(github.ref, 'refs/tags/ts/antfly/components/v')
        working-directory: ts
        run: pnpm --filter @antfly/components publish --access public --no-git-checks --provenance
