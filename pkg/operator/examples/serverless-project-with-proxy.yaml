# Example: Serverless project with Antfly-aware proxy
#
# This example shows:
# - a serverless query deployment
# - a serverless maintenance deployment
# - an optional proxy deployment
# - proxy route aggregation across projects in one namespace
#
# The operator will generate:
# - <name>-serverless-config
# - <name>-serverless-proxy-config
# - query / maintenance / proxy Deployments
# - query / proxy Services
# - optional HPA / PDB resources
#
# The proxy ConfigMap includes:
# - ANTFLY_PROXY_ROUTES_JSON
# - ANTFLY_PROXY_ROUTES_FILE=/etc/antfly-proxy/routes.json
# - ANTFLY_PROXY_BEARER_TOKENS_FILE=/etc/antfly-proxy-secret/bearer_tokens.json
#
# If multiple AntflyServerlessProject objects exist in the same namespace, their
# proxy routes are aggregated into each enabled proxy config so one proxy can
# resolve multiple tenant/table pairs.

apiVersion: antfly.io/v1
kind: AntflyServerlessProject
metadata:
  name: docs
  namespace: default
spec:
  objectStore:
    artifactsURI: s3://antfly-docs/artifacts
    manifestsURI: s3://antfly-docs/manifests
    walURI: s3://antfly-docs/wal
    catalogURI: s3://antfly-docs/catalog
    progressURI: s3://antfly-docs/progress

  images:
    queryImage: ghcr.io/antflydb/antfly-serverless-query:latest
    maintenanceImage: ghcr.io/antflydb/antfly-serverless-maintenance:latest
    proxyImage: ghcr.io/antflydb/antfly-proxy:latest
    imagePullPolicy: IfNotPresent

  query:
    replicas: 2
    port: 8080
    cacheMaxBytes: 8589934592
    cachePayloadMaxBytes: 6442450944
    autoScaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  maintenance:
    replicas: 1
    tickIntervalMS: 1000

  embeddings:
    indexesSecretRef: antfly-embedding-indexes

  proxy:
    enabled: true
    replicas: 2
    port: 8080
    serviceType: ClusterIP
    autoScaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    auth:
      bearerTokenSecretRef: antfly-proxy-bearer-tokens
    # Optional external route source. When set, the operator reads JSON route
    # entries from the referenced ConfigMap key and aggregates them with the
    # inline routes below.
    routeConfigMapRef: shared-serverless-proxy-routes
    routeConfigMapKey: routes.json
    routes:
      - tenant: tenant-a
        table: docs
        servingNamespace: docs-serving
        preferredBackend: serverless
        allowStateful: true
        allowServerless: true
        statefulURL: http://docs-cluster-public-api.default.svc:80
        serverlessURL: http://docs-serverless-query.default.svc:8080

  serviceAccountName: antfly-serverless
