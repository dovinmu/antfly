---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: antfly-operator-validating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: antfly-operator-webhook-service
        namespace: system
        path: /validate-antfly-io-v1-antflycluster
    failurePolicy: Fail
    name: vantflycluster.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - antfly-system
    rules:
      - apiGroups:
          - antfly.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - antflyclusters
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: antfly-operator-webhook-service
        namespace: system
        path: /validate-antfly-io-v1-antflybackup
    failurePolicy: Fail
    name: vantflybackup.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - antfly-system
    rules:
      - apiGroups:
          - antfly.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - antflybackups
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: antfly-operator-webhook-service
        namespace: system
        path: /validate-antfly-io-v1-antflyrestore
    failurePolicy: Fail
    name: vantflyrestore.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - antfly-system
    rules:
      - apiGroups:
          - antfly.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - antflyrestores
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: antfly-operator-webhook-service
        namespace: system
        path: /validate-antfly-io-v1-antflyserverlessproject
    failurePolicy: Fail
    name: vantflyserverlessproject.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - antfly-system
    rules:
      - apiGroups:
          - antfly.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - antflyserverlessprojects
    sideEffects: None
