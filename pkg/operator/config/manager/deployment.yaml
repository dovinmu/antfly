apiVersion: apps/v1
kind: Deployment
metadata:
  name: antfly-operator
  namespace: antfly-operator-namespace
  labels:
    app.kubernetes.io/name: antfly-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: antfly-operator
    app.kubernetes.io/managed-by: antfly-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: antfly-operator
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: antfly-operator
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: antfly-operator
        app.kubernetes.io/managed-by: antfly-operator
      annotations:
        kubectl.kubernetes.io/default-container: antfly-operator-manager
    spec:
      serviceAccountName: antfly-operator-service-account
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: antfly-operator-manager
        image: antfly-operator:latest
        imagePullPolicy: IfNotPresent
        command:
        - /manager
        args:
        - --leader-elect
        env:
        - name: ENABLE_WEBHOOKS
          value: "true"
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: webhook-server-cert
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      - key: "node.gke.io/balloon-pod-resize"
        operator: "Exists"
        effect: "NoSchedule"
      terminationGracePeriodSeconds: 10
