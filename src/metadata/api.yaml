tags:
  - name: getting_started
    x-displayName: Getting Started
    description: |
      Quick introduction to using the Antfly API.

      ## Client Libraries

      Antfly provides auto-generated SDKs from the OpenAPI specification:

      - **Go**: `github.com/antflydb/antfly/pkg/client`
      - **TypeScript**: `@antflydb/antfly-ts` (npm)
      - **Python**: `antfly-python` (PyPI)

      All SDKs are type-safe and kept in sync with the API through code generation.

      For architectural overview, feature comparisons, and use case guidance, see the [main documentation](https://antfly.io/docs)
    x-docsaf-questions:
      - Which SDK should I use for my project?
      - How do I authenticate with the API?
      - Where can I find code examples?

  - name: cluster_management
    x-displayName: Cluster Management
    x-docsaf-questions:
      - How do I check if my cluster is healthy?
      - What do the different health statuses mean?
      - How do I integrate Antfly with Prometheus?
    description: |
      Monitor and manage your Antfly cluster's health and status.

      ## Cluster Health

      The cluster health endpoint provides real-time status of all stores and shards:
      - **healthy**: All nodes and shards operational
      - **degraded**: Some shards unavailable but cluster functional
      - **unhealthy**: Critical failures affecting availability
      - **error**: Cluster-wide failures

      ## Monitoring

      - Health check endpoint: `GET /healthz`
      - Prometheus metrics: `GET /metrics` on port 4200

      Use these endpoints to integrate with monitoring systems and alerting infrastructure.

  - name: table_management
    x-displayName: Table Management
    x-docsaf-questions:
      - Do I need to define a schema before inserting documents?
      - How do I add search capabilities to a table?
      - What's the difference between text and keyword types?
    description: |
      Manage tables in your Antfly cluster. Tables store your documents and support multiple indexes.

      ## Schema

      Schemas define the structure and types of data in your tables using **JSON Schema** with custom Antfly extensions.
      While optional, defining a schema provides several benefits:

      - **Type Safety**: Ensures data consistency across documents
      - **Optimized Indexing**: Full Text Index uses type information for appropriate Bleve mappings
      - **Better Search**: Type-aware indexing improves search relevance and performance
      - **Query Optimization**: Enables type-specific query operations

      ## JSON Schema Structure

      Antfly uses standard JSON Schema with custom extensions:

      ```json
      {
        "document_schemas": {
          "article": {
            "schema": {
              "type": "object",
              "properties": {
                "title": {
                  "type": "string",
                  "x-antfly-types": ["text", "keyword"]
                },
                "body": {
                  "type": "string",
                  "x-antfly-types": ["html"]
                },
                "tags": {
                  "type": "array",
                  "items": {"type": "string"},
                  "x-antfly-types": ["keyword"]
                },
                "metadata": {
                  "type": "object",
                  "properties": {
                    "author": {"type": "string"}
                  }
                }
              },
              "additionalProperties": false,
              "x-antfly-include-in-all": ["title", "body"]
            }
          }
        }
      }
      ```

      **Dynamic Indexing** (`additionalProperties`):
      - `"additionalProperties": false` - Only index fields defined in `properties` (recommended for performance)
      - `"additionalProperties": true` - Index all fields dynamically (flexible but slower)
      - If not specified, dynamic indexing is disabled

      **Nested Objects**:
      - Use `"type": "object"` with nested `properties` for structured data
      - Nested objects don't inherit `x-antfly-include-in-all` from parent
      - Arrays of objects: Use `"type": "array"` with `"items": {"type": "object", ...}`

      ## Antfly Extensions

      ### `x-antfly-types`
      Array of Antfly type strings specifying how to index a field. Multiple types create multiple field mappings:

      - **Single type**: `"x-antfly-types": ["text"]` - Creates standard text field
      - **Multiple types**: `"x-antfly-types": ["text", "keyword"]` - Creates `fieldName` (text) and `fieldName__keyword`
      - **With search-as-you-type**: `"x-antfly-types": ["text", "search_as_you_type"]` - Creates `fieldName` (text) and `fieldName__2gram`

      **Type Combination Rules**:
      - `text` and `html` are mutually exclusive (choose one as primary type)
      - Primary types (`text`, `html`) can be combined with variants (`keyword`, `search_as_you_type`)
      - `search_as_you_type` + `keyword` allowed without primary type (auto-adds `text`)

      ### `x-antfly-index`
      Boolean to disable indexing for a field:
      ```json
      {"type": "string", "x-antfly-index": false}
      ```

      ### `x-antfly-include-in-all`
      Schema-level array of field names to include in the special `_all` field for cross-field search:
      ```json
      {
        "x-antfly-include-in-all": ["title", "body", "description"]
      }
      ```
      Only text-based types (`text`, `html`, `keyword`, `search_as_you_type`, `link`) are included, and only the primary field (not `__keyword` or `__2gram` variants).

      ## Antfly Types

      ### Text Types
      - `text` - Full-text searchable with tokenization and analysis. Use for articles, descriptions, searchable content.
      - `html` - Full-text searchable with HTML tag stripping. Use for HTML content.
      - `keyword` - Exact-match strings (not analyzed). Use for IDs, tags, categories, filters.
      - `search_as_you_type` - Edge n-gram analyzer for autocomplete. Creates `fieldName__2gram` mapping.
      - `link` - URL/link field (keyword analyzer).

      ### Numeric and Boolean Types
      - `numeric` - Numbers (integers and floats). Use for counts, prices, scores.
      - `boolean` - True/false values.

      ### Date/Time Types
      - `datetime` - Timestamp fields. Use for created/updated dates, events.

      ### Geospatial Types
      - `geopoint` - Latitude/longitude point. Use for locations, coordinates.
      - `geoshape` - Complex geographic shape. Use for boundaries, regions.

      ### Special Types
      - `embedding` - Vector embeddings (not indexed in Bleve). Use for similarity search.
      - `blob` - Binary data (not indexed). Use for images, files, binary content.

      ## Type Inference

      If `x-antfly-types` is not specified, types are inferred from JSON Schema `type`:
      - `"type": "string"` → `["text"]`
      - `"type": "number"` or `"integer"` → `["numeric"]`
      - `"type": "boolean"` → `["boolean"]`

      ## Automatic Fields

      Antfly automatically adds these fields to all document schemas:
      - **`_timestamp`**: Datetime field for document timestamps
      - **`_summaries`**: Object field (map of index names to summary text) for AI-generated summaries

      ## Field Naming Conventions

      When multiple types are specified, Antfly creates additional field mappings with suffixes:
      - **Primary field** (`text` or `html`): Uses original field name
      - **Keyword variant**: `fieldName__keyword`
      - **Search-as-you-type**: `fieldName__2gram`

      Example: `"x-antfly-types": ["text", "keyword", "search_as_you_type"]` creates:
      - `title` (text analyzer)
      - `title__keyword` (keyword analyzer)
      - `title__2gram` (edge n-gram analyzer)

      ## Best Practices

      - Use `text` for searchable content, `keyword` for exact matching
      - Combine types for flexible querying: `["text", "keyword"]` enables both full-text and exact search
      - Add `search_as_you_type` for autocomplete functionality
      - Use `html` type for HTML content to strip tags during indexing
      - Specify `x-antfly-include-in-all` for important searchable fields

      ## Performance Considerations

      - `text` and `html` fields have higher indexing cost due to text analysis
      - `keyword` fields are faster to index but don't support partial matches
      - `search_as_you_type` adds edge n-gram indexing overhead
      - `embedding` and `blob` fields are automatically excluded from text indexing
      - Multiple types per field increase index size and indexing time

      ## Document TTL (Time-To-Live)

      Antfly supports automatic expiration and deletion of documents after a specified duration.
      Documents are automatically removed by a background cleanup job running on the Raft leader.

      ### Basic Configuration

      Configure TTL when creating a table using `ttl_duration`:

      ```json
      {
        "name": "sessions",
        "ttl_duration": "24h",
        "document_schemas": {
          "session": {
            "schema": {
              "type": "object",
              "properties": {
                "user_id": {"type": "string"},
                "data": {"type": "object"}
              }
            }
          }
        }
      }
      ```

      **How it works:**
      - Documents expire after the specified duration from their timestamp
      - Uses `_timestamp` field by default (automatically added at insertion)
      - Background cleanup runs every 30 seconds on the Raft leader
      - Expired documents are filtered from queries immediately (before cleanup)
      - Deletions are batched (1000 documents at a time) and go through Raft consensus

      ### Custom TTL Reference Field

      Use a custom timestamp field instead of `_timestamp`:

      ```json
      {
        "name": "events",
        "ttl_duration": "7d",
        "ttl_field": "created_at",
        "document_schemas": {
          "event": {
            "schema": {
              "type": "object",
              "properties": {
                "created_at": {"type": "string", "format": "date-time"},
                "event_type": {"type": "string"}
              },
              "required": ["created_at"]
            }
          }
        }
      }
      ```

      **Requirements:**
      - Custom TTL field must be present in all documents
      - Must be in RFC3339 format (e.g., `2025-01-01T12:00:00Z`)
      - Documents without the field will fail validation

      ### Duration Format

      TTL durations use Go duration format:
      - `30s` - 30 seconds
      - `5m` - 5 minutes
      - `24h` - 24 hours
      - `7d` - 7 days (treated as 168h)
      - `168h` - 1 week

      ### Use Cases

      **Session Management:**
      ```json
      {
        "ttl_duration": "1h",
        "ttl_field": "last_accessed"
      }
      ```
      Sessions expire 1 hour after `last_accessed`. Update the timestamp on each access to extend the session.

      **Temporary Caching:**
      ```json
      {
        "ttl_duration": "24h"
      }
      ```
      Cache entries expire 24 hours after insertion.

      **Log Rotation:**
      ```json
      {
        "ttl_duration": "30d"
      }
      ```
      Logs are automatically deleted after 30 days.

      ### Performance Characteristics

      **Optimized Storage:**
      - TTL timestamps stored separately (`:t` suffix keys) for O(1) lookups
      - No JSON deserialization needed during cleanup scans
      - ~100-1000x faster than scanning full document bodies
      - Minimal storage overhead (~30 bytes per document)

      **Query Filtering:**
      - Single key lookup to check expiration (~microseconds)
      - No impact on query latency
      - Scales to millions of documents

      **Cleanup Behavior:**
      - Runs every 30 seconds (configurable)
      - Leader-only operation (prevents duplicate work)
      - 5-second grace period ensures writes are fully replicated
      - Batched deletions (1000 docs) prevent overwhelming the system

      ### Monitoring

      TTL operations are logged with cleanup metrics:
      ```
      INFO  Starting TTL cleanup job ttl_duration=24h cleanup_interval=30s
      INFO  Cleaned up expired documents count=42 duration=245ms total_expired=1337
      ```

      ### Modifying TTL Configuration

      **Adding TTL to existing table:**
      - Update schema with `ttl_duration` field
      - Applies retroactively to all documents
      - Documents already expired are marked for immediate deletion

      **Removing TTL:**
      - Set `ttl_duration` to empty string
      - All expiration processing stops
      - Previously expired documents remain

      **Changing duration:**
      - Update schema with new `ttl_duration`
      - New duration applies immediately to all documents
      - Expiration recalculated using existing timestamps

      ### Limitations

      - **Clock synchronization required**: Use NTP to sync clocks across cluster nodes
      - **Cleanup latency**: Expired documents deleted within ~30 seconds (cleanup interval)
      - **Table-level configuration**: TTL applies to all documents in the table
      - **Timestamp format**: Must be RFC3339 or RFC3339Nano

  - name: data_operations
    x-displayName: Data Operations
    x-docsaf-questions:
      - How do distributed transactions work in Antfly?
      - How do I sync data from Postgres or Shopify?
      - What's the difference between batch operations and linear merge?
      - How do I backup and restore a table?
    description: |
      Perform data operations including batch inserts/deletes, linear merge sync,
      backup/restore, and individual key lookups.

      ## Batch Operations

      Efficiently insert or delete multiple documents in a single request. The batch
      endpoint accepts both inserts (map of key-value pairs) and deletes (array of keys).

      ## Distributed Transactions

      Antfly provides atomic cross-shard write transactions using a coordinator-based
      2-phase commit (2PC) protocol. When a batch operation spans multiple shards, Antfly
      automatically executes it as a distributed transaction.

      **How it works:**
      1. Metadata server allocates HLC timestamp and selects coordinator shard
      2. Coordinator writes transaction record, participants write intents
      3. After all intents succeed, coordinator commits transaction
      4. Participants are notified asynchronously to resolve intents
      5. Recovery loop ensures notifications complete even after coordinator failure

      **Features:**
      - **Automatic**: No special API required - just use the batch endpoint
      - **Atomic**: All writes across all shards commit or abort together
      - **Recoverable**: Coordinator failures are handled via recovery loops
      - **Efficient**: ~20ms latency for cross-shard transactions

      **Performance:**
      - Single-shard batches: < 5ms latency
      - Cross-shard transactions: ~20ms latency
      - Intent resolution: < 30 seconds worst-case (via recovery loop)

      **Guarantees:**
      - All writes succeed or all fail (atomicity)
      - Coordinator failure is recoverable (new leader resumes notifications)
      - Idempotent resolution (duplicate notifications are safe)

      **Use Cases:**
      - Updating related records across shards (e.g., user profile + preferences)
      - Multi-table inserts that must succeed together
      - Bulk imports requiring all-or-nothing semantics

      ## Linear Merge (Data Sync)

      Synchronize and keep Antfly in sync with external data sources like Shopify,
      Postgres, S3, or any sorted record source. Also known as: data synchronization,
      database sync, incremental sync, e-commerce sync.

      Both source and Antfly must be sorted by the same key. Performs three-way merge:
      inserts new records, updates changed records, deletes records absent from source.

      **How it works:**
      1. Query external source with pagination (sorted by key)
      2. Send sorted page to linear merge endpoint
      3. Antfly merges: upserts present records, deletes Antfly records absent from page
      4. Repeat for next page - no sync state required between pages

      **Use Cases:**

      - **Postgres/MySQL**: `SELECT * FROM products ORDER BY id LIMIT 1000 OFFSET 0`
        - Sync production DB to Antfly for hybrid search
        - Run periodically (hourly/daily) to stay in sync

      - **Shopify API**: `GET /admin/api/2024-01/products.json?order=id&limit=250`
        - Sync e-commerce catalog with cursor pagination
        - Antfly becomes searchable product index

      - **S3 Data Lake**: Sorted JSON files (`data/0001.json`, `data/0002.json`, ...)
        - Batch import from data warehouse exports
        - Process files in order, send contents page by page

      - **Databricks**: `SELECT * FROM delta_table ORDER BY key LIMIT 10000`
        - Sync data warehouse tables to Antfly
        - Enable low-latency search over warehouse data

      **Benefits:**
      - **Stateless**: No cursors or checkpoints - restart from any page
      - **Idempotent**: Safe to re-run if interrupted
      - **Efficient**: Stream comparison, no random access needed

      **WARNING**: Not safe for concurrent merges with overlapping ranges.
      Single-client sync API only.

      ## Backup and Restore

      Create backups to various storage backends:
      - `file:///path/to/backup` - Local filesystem
      - `s3://bucket/path` - Amazon S3

      Restore operations rebuild tables from backup snapshots.

      ## Key Lookups

      Direct key-value lookups for retrieving individual documents by their unique key.

  - name: query_operations
    x-displayName: Query Operations
    x-docsaf-questions:
      - What's the difference between full-text and semantic search?
      - How does hybrid search with RRF work?
      - How do I improve search relevance?
      - What's the difference between RAG and Retrieval Agent?
    description: |
      Execute queries across tables using full-text search, vector similarity search,
      or hybrid approaches combining both with Reciprocal Rank Fusion (RRF).

      ## Query Types

      ### Full-Text Search
      Uses Bleve query syntax for powerful text searching:
      - Field-specific queries: `body:computer`
      - Boolean operators: `AND`, `OR`, `NOT`
      - Range queries: `year:>2020`
      - Phrase queries: `"exact phrase"`

      ### Semantic Search
      Natural language queries using vector similarity:
      - Searches across specified embedding indexes
      - Returns semantically similar documents
      - Supports multiple embedding models

      ### Hybrid Search (RRF)
      Combines full-text and semantic search using Reciprocal Rank Fusion:
      ```json
      {
        "full_text_search": {"query": "body:computer"},
        "semantic_search": "artificial intelligence",
        "indexes": ["title_body_nomic"]
      }
      ```

      ## Filtering and Exclusion

      Refine results with powerful filtering:

      ### Filter Prefix
      Only return documents whose keys start with a specific string:
      ```json
      {"filter_prefix": "user:"}
      ```
      Returns only keys like "user:123", "user:456"

      ### Filter Query
      Apply a Bleve query as an AND condition:
      ```json
      {"filter_query": {"query": "+category:technology +year:>2020"}}
      ```
      Documents must match both the main query and filter query.

      ### Exclusion Query
      Exclude documents matching a Bleve query (NOT condition):
      ```json
      {"exclusion_query": {"query": "category:deprecated OR status:archived"}}
      ```

      **Performance Note**: All filters are applied before scoring and ranking, improving query performance.

      ## RAG (Retrieval-Augmented Generation)

      Execute queries and generate summaries using LLMs:
      - Supports multiple retrieval queries
      - Streams results as Server-Sent Events (SSE)
      - Returns markdown summaries with inline citations
      - Combines results from multiple tables

      ## Retrieval Agent

      Intelligent query routing with automatic query generation:
      - Classifies queries as "question" or "search"
      - Generates optimal search queries across tables
      - Returns generated responses (for questions) or document IDs (for searches)
      - Streams classification, keywords, queries, and results

      ## Improving Search Relevance

      Antfly provides several techniques to improve search result quality:

      ### 1. Hybrid Search (Combine Full-Text + Semantic)
      Use both `full_text_search` and `semantic_search` together. Results are merged using
      Reciprocal Rank Fusion (RRF) to balance keyword matching and semantic similarity.

      ### 2. Reranking
      Apply a cross-encoder model to re-score results based on query-document relevance.
      Rerankers are more accurate than embedding models but slower, so use them on
      already-filtered results (e.g., top 50-100).

      ```json
      {
        "semantic_search": "gaming laptops",
        "limit": 100,
        "reranker": {
          "provider": "ollama",
          "model": "dengcao/Qwen3-Reranker-0.6B:F16",
          "field": "description"
        }
      }
      ```

      ### 3. Result Pruning
      Filter out low-quality results by detecting score gaps or setting minimum thresholds:

      ```json
      {
        "semantic_search": "machine learning",
        "pruner": {
          "min_score_ratio": 0.5,
          "max_score_gap_percent": 30.0
        }
      }
      ```

      - `min_score_ratio`: Keep only results scoring at least X% of the top result
      - `max_score_gap_percent`: Stop when a consecutive score gap exceeds X% of the total score range

      ### 4. Merge Strategies
      Choose how full-text and semantic results are combined:
      - `rrf` (default): Reciprocal Rank Fusion - balanced, works well in most cases
      - `rsf`: Relative Score Fusion - normalizes and weights scores differently
      - `failover`: Use full-text if embedding generation fails

      ### 5. Query Filtering
      Use `filter_query` and `filter_prefix` to pre-filter before scoring, improving
      both performance and relevance by removing irrelevant documents early.

      **Best Practice**: Combine techniques for optimal results:
      1. Start with hybrid search (full-text + semantic)
      2. Apply filters to narrow the domain
      3. Use reranker on top results
      4. Apply pruner to remove outliers

  - name: index_management
    x-displayName: Index Management
    x-docsaf-questions:
      - What's the difference between full_text and embeddings indexes?
      - Which embedding provider should I use?
      - How do I index images and other media?
      - Can I add indexes after the table is created?
    description: |
      Create and manage indexes for full-text search, vector similarity search, and multimodal content.

      ## Index Types

      Antfly supports two primary index types:

      ### `full_text` - Full-Text Search Index
      BM25-based full-text search using Bleve. Automatically uses schema information for field mappings.

      **Configuration**:
      ```json
      {
        "type": "full_text",
        "name": "search_idx",
        "mem_only": false
      }
      ```

      **Options**:
      - `mem_only` (optional): If true, stores index in memory only (useful for testing)

      **Features**:
      - BM25 ranking algorithm
      - Field-specific queries (`title:computer`)
      - Boolean operators (`AND`, `OR`, `NOT`)
      - Range queries (`year:>2020`)
      - Phrase queries (`"exact phrase"`)
      - Uses schema's `x-antfly-types` for field analyzers
      - Respects `x-antfly-include-in-all` for cross-field search

      ### `embeddings` - Vector Similarity Index
      Approximate k-nearest neighbors (AKNN) index for semantic similarity search using vector embeddings.

      **Performance Features**:
      - Hardware-accelerated distance calculations using SIMD instructions
      - x86/AMD: AVX2 and AVX-512 optimizations for vector operations
      - ARM: NEON and SME (Scalable Matrix Extension) acceleration
      - RaBitQ quantization for reduced memory footprint and faster search
      - No GPU required - optimized for CPU-based deployments

      **Basic Configuration**:
      ```json
      {
        "type": "embeddings",
        "name": "embedding_idx",
        "field": "description",
        "embedder": {
          "provider": "ollama",
          "model": "all-minilm",
          "url": "http://localhost:11434"
        }
      }
      ```

      **Index Modes**:

      **Managed indexes** (`external: false`, default)
      - Antfly owns embedding generation
      - Must specify `field` or `template`
      - Must specify `embedder`
      - Reject manual `_embeddings` writes for that index

      **External indexes** (`external: true`)
      - Your application owns embedding generation
      - Must not specify `field`, `template`, or `embedder`
      - Dense external indexes must specify `dimension`
      - Vectors are written directly through the document `_embeddings` field

      **Managed Index Fields**:
      - `field`: Field to embed using JSONPath syntax (e.g., `"description"`, `"metadata.content"`, `"$.user.bio"`)
      - `template`: Handlebars template for custom prompt generation
      - `embedder`: Embedder configuration for generating vectors
      - `dimension`: Optional for dense indexes; inferred from the embedder if omitted
      - `summarizer`: Vision/multimodal model for processing images/audio/video
      - `mem_only`: Store index in memory only

      **External Index Fields**:
      - `external: true`
      - `dimension`: Required for dense indexes
      - `sparse: true`: Use sparse vectors supplied through `_embeddings`

      **External Dense Example**:
      ```json
      {
        "type": "embeddings",
        "name": "manual_dense_idx",
        "external": true,
        "dimension": 384
      }
      ```

      **External Sparse Example**:
      ```json
      {
        "type": "embeddings",
        "name": "manual_sparse_idx",
        "external": true,
        "sparse": true
      }
      ```

      **Writing Manual Embeddings**:
      - Manual `_embeddings` writes are only accepted for `external: true` indexes
      - Dense vectors use arrays: `"_embeddings": { "manual_dense_idx": [0.1, 0.2, 0.3] }`
      - Sparse vectors use token-weight maps: `"_embeddings": { "manual_sparse_idx": { "7": 1.5, "42": 2.0 } }`
      - Explicit delete uses `null`: `"_embeddings": { "manual_dense_idx": null }`
      - Omitting `_embeddings[<index>]` is a no-op; it does not delete the stored vector

      ## Embedder Providers

      Antfly supports multiple embedding providers via the `embedder` configuration:

      ### Ollama (Local Models)
      ```json
      {
        "provider": "ollama",
        "model": "all-minilm",
        "url": "http://localhost:11434"
      }
      ```
      Popular models: `all-minilm`, `nomic-embed-text`, `mxbai-embed-large`

      ### OpenAI
      ```json
      {
        "provider": "openai",
        "model": "text-embedding-3-small",
        "api_key": "sk-..."
      }
      ```
      Models: `text-embedding-3-small` (1536d), `text-embedding-3-large` (3072d), `text-embedding-ada-002` (1536d)

      ### Google Gemini
      ```json
      {
        "provider": "gemini",
        "model": "text-embedding-004",
        "project_id": "my-project",
        "location": "us-central1",
        "dimension": 768
      }
      ```
      Supports multimodal embeddings (text + images).

      ### AWS Bedrock
      ```json
      {
        "provider": "bedrock",
        "model": "amazon.titan-embed-text-v1",
        "region": "us-east-1"
      }
      ```
      Models: `amazon.titan-embed-text-v1`, `amazon.titan-embed-text-v2`, `cohere.embed-english-v3`, `cohere.embed-multilingual-v3`

      ## Multimodal Indexing

      Vector indexes can process images, audio, and video using vision/multimodal models.

      ### With Summarizer (Two-Stage)
      Use a vision model to generate text descriptions, then embed the descriptions:

      ```json
      {
        "type": "embeddings",
        "dimension": 384,
        "embedder": {
          "provider": "ollama",
          "model": "all-minilm"
        },
        "summarizer": {
          "provider": "ollama",
          "model": "llava"
        }
      }
      ```

      **How it works**: Vision model (`llava`) generates text description → Embedder (`all-minilm`) creates vector

      **Supported Vision Models**:
      - **Ollama**: `llava`, `llava-phi3`, `bakllava`, `llava-llama3`
      - **OpenAI**: `gpt-4o`, `gpt-4-turbo`, `gpt-4o-mini`
      - **Gemini**: `gemini-2.0-flash-exp`, `gemini-1.5-pro`, `gemini-1.5-flash`
      - **Anthropic**: `claude-3-5-sonnet-20241022`, `claude-3-opus-20240229`
      - **Bedrock**: `anthropic.claude-3-5-sonnet-20241022-v2:0`

      ### Native Multimodal (Single-Stage)
      Some models support direct multimodal embeddings:

      ```json
      {
        "type": "embeddings",
        "dimension": 1024,
        "embedder": {
          "provider": "gemini",
          "model": "text-embedding-004",
          "project_id": "my-project"
        }
      }
      ```

      Gemini's embedding models can directly process text and images without a separate vision model.

      ## Supported Media Formats

      When using multimodal indexes, documents can reference media in multiple ways:

      ### Images
      - **Base64 encoded (data URI)**: `data:image/jpeg;base64,<base64>`, `data:image/png;base64,<base64>`, `data:image/webp;base64,<base64>`
      - **URLs**: `http://`, `https://`, `s3://`, `file://`

      ### Audio & Video
      - **URLs**: `http://`, `https://`, `s3://`, `file://`

      Example document with image:
      ```json
      {
        "title": "Product Photo",
        "image": "data:image/jpeg;base64,iVBORw0KGgoAAAANSUhEUgA..."
      }
      ```

      ## Template-Based Prompts

      Customize how documents are converted to text before embedding using Handlebars templates:

      ```json
      {
        "type": "embeddings",
        "dimension": 384,
        "field": "description",
        "template": "Product: {{title}}\nCategory: {{category}}\nDescription: {{description}}",
        "embedder": {
          "provider": "ollama",
          "model": "all-minilm"
        }
      }
      ```

      **Template System:**
      - **Syntax**: Handlebars templating (https://handlebarsjs.com/guide/)
      - **Caching**: Templates are automatically cached with configurable TTL (default: 5 minutes)
      - **Context**: Templates receive the full document as context

      **Basic Syntax:**
      - `{{fieldName}}`: Insert field value
      - `{{#if field}}...{{/if}}`: Conditional logic
      - `{{#each array}}...{{/each}}`: Iterate arrays
      - `{{#unless condition}}...{{/unless}}`: Inverse conditional
      - `{{@index}}`, `{{@key}}`, `{{@first}}`, `{{@last}}`: Loop variables

      **Built-in Helpers:**

      1. **scrubHtml** - Remove script/style tags and extract clean text from HTML
         ```handlebars
         {{scrubHtml html_content}}
         ```
         - Removes `<script>` and `<style>` tags
         - Adds newlines after block elements (p, div, h1-h6, li, etc.)
         - Returns plain text with preserved readability

      2. **eq** - Equality comparison for conditionals
         ```handlebars
         {{#if (eq status "active")}}Active{{/if}}
         {{#if (eq @key "special")}}Special field{{/if}}
         ```

      3. **media** - GenKit dotprompt media directive for multimodal content
         ```handlebars
         {{media url=imageDataURI}}
         {{media url=this.image_url}}
         {{media url="https://example.com/image.jpg"}}
         {{media url="s3://endpoint/bucket/image.png"}}
         {{media url="file:///path/to/image.jpg"}}
         ```

         **Supported URL Schemes:**
         - `data:` - Base64 encoded data URIs (e.g., `data:image/jpeg;base64,...`)
         - `http://` / `https://` - Web URLs with automatic content type detection
         - `file://` - Local filesystem paths
         - `s3://` - S3-compatible storage (format: `s3://endpoint/bucket/key`)

         **Automatic Content Processing:**
         - **Images**: Downloaded, resized (if needed), converted to data URIs
         - **PDFs**: Text extracted or first page rendered as image
         - **HTML**: Readable text extracted using Mozilla Readability

         **Security Controls:**
         Downloads are protected by content security settings:
         - Allowed host whitelist
         - Private IP blocking (prevents SSRF attacks)
         - Download size limits (default: 100MB)
         - Download timeouts (default: 30s)
         - Image dimension limits (default: 2048px, auto-resized)

         See: https://antfly.io/docs/configuration#security--cors

      4. **encodeToon** - Encode data in TOON format (Token-Oriented Object Notation)
         ```handlebars
         {{encodeToon this.fields}}
         {{encodeToon this.fields lengthMarker=false indent=4}}
         {{encodeToon this.fields delimiter="\t"}}
         ```

         **TOON Format** provides **30-60% token reduction** compared to JSON:
         - Compact syntax using `:` for key-value pairs
         - Array length markers: `tags[#3]: ai,search,ml`
         - Tabular format for uniform data structures
         - Optimized for LLM parsing

         Options:
         - `lengthMarker` (bool): Add # prefix to array counts (default: true)
         - `indent` (int): Indentation spacing (default: 2)
         - `delimiter` (string): Field separator for tabular arrays (use `"\t"` for tabs)

         Example output:
         ```
         title: Introduction to Vector Search
         author: Jane Doe
         tags[#3]: ai,search,ml
         ```

         **References:**
         - TOON Specification: https://github.com/toon-format/toon
         - Go Implementation: https://github.com/alpkeskin/gotoon

      Without a template, the `field` value is used directly, or the entire document is serialized.

      ## Field Extraction with JSONPath

      The `field` parameter supports JSONPath syntax for extracting values from nested document structures:

      ```json
      {
        "type": "embeddings",
        "field": "metadata.description",
        "embedder": {"provider": "ollama", "model": "all-minilm"}
      }
      ```

      **JSONPath Examples**:
      - `"title"` - Top-level field
      - `"user.bio"` - Nested field (auto-prepends `$.` if not present)
      - `"$.metadata.content"` - Explicit JSONPath
      - `"$.items[0].name"` - Array indexing

      The extracted value must be a string. Use `template` for complex transformations or combining multiple fields.

      ## Configuration Examples

      ### Simple Text Embedding
      ```json
      {
        "type": "embeddings",
        "field": "content",
        "embedder": {
          "provider": "ollama",
          "model": "all-minilm"
        }
      }
      ```
      Note: `dimension` is omitted and will be inferred from the `all-minilm` model (384).

      ### Multimodal with Custom Template
      ```json
      {
        "type": "embeddings",
        "dimension": 768,
        "template": "{{title}}: {{description}}",
        "embedder": {
          "provider": "gemini",
          "model": "text-embedding-004",
          "dimension": 768
        },
        "summarizer": {
          "provider": "gemini",
          "model": "gemini-1.5-flash"
        }
      }
      ```

      ### Production OpenAI Setup
      ```json
      {
        "type": "embeddings",
        "dimension": 1536,
        "field": "body",
        "embedder": {
          "provider": "openai",
          "model": "text-embedding-3-small",
          "api_key": "${OPENAI_API_KEY}"
        }
      }
      ```

      ## Best Practices

      - **Choose dimension wisely**: Higher dimensions improve accuracy but increase storage/compute costs
      - **Use templates for structured data**: Combine multiple fields into meaningful prompts
      - **Multimodal strategy**: Use two-stage (summarizer + embedder) for flexibility, single-stage for simplicity
      - **Local vs Cloud**: Ollama for development/privacy, cloud providers for production/scale
      - **Field specification**: Specify `field` when embedding a single field to avoid whole-document serialization

      ## Implementing Autocomplete Search

      To implement autocomplete/search-as-you-type functionality:

      **1. Define schema with search_as_you_type type:**
      ```json
      {
        "document_schemas": {
          "product": {
            "schema": {
              "type": "object",
              "properties": {
                "name": {
                  "type": "string",
                  "x-antfly-types": ["text", "search_as_you_type"]
                }
              }
            }
          }
        }
      }
      ```

      **2. Create full-text index:**
      ```json
      {
        "indexes": {
          "search_idx": {
            "type": "full_text"
          }
        }
      }
      ```

      **3. Query the __2gram field:**
      ```json
      {
        "full_text_search": {
          "query": "name__2gram:lap"
        }
      }
      ```

      The `search_as_you_type` type creates an edge n-gram indexed field (suffixed with `__2gram`)
      that matches partial input as users type. For example, "lap" matches "laptop", "lapel", etc.

      ## Reindexing Data

      What happens when you need to reindex? Antfly handles reindexing through async enrichment,
      automatically rebuilding indexes in the background. Here's what to expect when reindexing
      data (after adding a new index or changing configuration):

      ### Adding a New Index to Existing Table

      Antfly handles reindexing automatically through async enrichment:

      **1. Add the index:**
      ```bash
      POST /tables/{tableName}/indexes/{indexName}
      {
        "type": "embeddings",
        "embedder": {...}
      }
      ```

      **2. Enrichment happens automatically:**
      - Existing documents are enriched in the background
      - New writes are enriched immediately
      - Leader-only processing prevents duplicate work
      - Check index status to monitor progress

      **3. Monitor progress:**
      ```bash
      GET /tables/{tableName}/indexes/{indexName}
      ```

      Look at `shard_status` for enrichment progress per shard.

      ### Error Handling for Async Enrichment

      When embedding generation or enrichment fails, Antfly handles errors gracefully:

      **Retry Behavior:**
      - Failed enrichments are automatically retried with exponential backoff
      - Leader-only processing ensures no duplicate work during retries
      - Enrichment continues for other documents even if some fail

      **Monitoring Failures:**
      - Check index status (`GET /tables/{table}/indexes/{index}`) for error counts
      - Prometheus metrics expose enrichment failure rates
      - Failed documents remain searchable via full-text index (if configured)

      **Common Failure Scenarios:**

      1. **Embedding API Unavailable**
         - Enrichment retries automatically when service recovers
         - Documents remain indexed (without embeddings) for full-text search
         - Use `sync_level: enrichments` for synchronous embedding (fails write if embedding fails)

      2. **Rate Limiting**
         - Automatic backoff and retry
         - Consider using local Ollama to avoid rate limits
         - Or increase API quota with embedding provider

      3. **Model Errors (invalid input, size limits)**
         - Logged with document ID for investigation
         - Retries stop after max attempts
         - Document remains in table without enrichment

      **Fallback Strategy:**

      For critical workloads, use the `failover` merge strategy to fall back to full-text search
      when embedding generation fails:

      ```json
      {
        "full_text_search": {"query": "search term"},
        "semantic_search": "search term",
        "merge_config": {"strategy": "failover"}
      }
      ```

      This ensures queries always return results even if embeddings are unavailable.

      ### Changing Index Configuration

      To change index configuration:
      1. Drop the existing index: `DELETE /tables/{table}/indexes/{index}`
      2. Recreate with new config: `POST /tables/{table}/indexes/{index}`
      3. Existing data is automatically re-enriched

      **Note:** Full-text indexes (`full_text`) reindex immediately on creation and automatically
      rebuild when schema changes are made. Vector indexes (`embeddings`) enrich asynchronously in the background.

      ### Backup Before Major Reindexing

      For large datasets, backup before reindexing:
      ```bash
      POST /tables/{tableName}/backup
      {
        "backup_id": "before-reindex-2025-01",
        "location": "s3://mybucket/backups/products"
      }
      ```

      ## Graph Indexes and Edge TTL

      Graph indexes (`graph`) enable relationship modeling and traversal queries. Like documents, graph edges
      support automatic expiration through per-index TTL configuration.

      ### Graph Index Overview

      Graph indexes store directed edges between documents, enabling queries like:
      - Finding all connections from a document
      - Traversing multi-hop paths
      - Filtering relationships by type

      **Basic graph index:**
      ```json
      {
        "type": "graph",
        "name": "social_graph"
      }
      ```

      ### Edge TTL Configuration

      Configure automatic edge expiration per graph index using `ttl_duration`:

      ```json
      {
        "type": "graph",
        "name": "recent_interactions",
        "ttl_duration": "7d"
      }
      ```

      **How it works:**
      - Edges expire after the specified duration from their creation timestamp
      - Background cleanup runs every 30 seconds on the Raft leader
      - Each edge has a timestamp key (`:t` suffix) tracking when it was created
      - Expired edges are filtered from traversal queries immediately
      - Deletions are batched (1000 edges at a time) and go through Raft consensus

      ### Edge TTL vs Document TTL

      **Document TTL** (table-level):
      - Configured via `ttl_duration` in table schema
      - Applies to all documents in the table
      - Uses `_timestamp` or custom `ttl_field`

      **Edge TTL** (index-level):
      - Configured via `ttl_duration` in graph index config
      - Applies only to edges in that specific graph index
      - Uses edge creation timestamp (stored in `:t` key)
      - Different graph indexes can have different TTL durations

      ### Duration Format

      Edge TTL uses the same Go duration format as document TTL:
      - `30s` - 30 seconds
      - `5m` - 5 minutes
      - `24h` - 24 hours
      - `7d` - 7 days (treated as 168h)

      ### Use Cases

      **Session Graphs:**
      ```json
      {
        "type": "graph",
        "name": "active_sessions",
        "ttl_duration": "1h"
      }
      ```
      Track active user sessions; edges expire after 1 hour of inactivity.

      **Recent Activity Feed:**
      ```json
      {
        "type": "graph",
        "name": "recent_interactions",
        "ttl_duration": "7d"
      }
      ```
      Keep only the last week of user interactions; older edges automatically deleted.

      **Temporary Recommendations:**
      ```json
      {
        "type": "graph",
        "name": "trending_connections",
        "ttl_duration": "24h"
      }
      ```
      Track trending content connections; refresh daily by letting old edges expire.

      **Rate Limiting:**
      ```json
      {
        "type": "graph",
        "name": "api_calls",
        "ttl_duration": "1h"
      }
      ```
      Track API calls per user; edges expire after 1 hour for sliding window rate limiting.

      ### Performance Characteristics

      Edge TTL cleanup uses the same optimized approach as document TTL:

      **Optimized Scanning:**
      - Only scans edge timestamp keys (`:t` suffix)
      - No document deserialization required
      - O(1) per edge - just reads a timestamp
      - ~100-1000x faster than scanning full edge data

      **Query Filtering:**
      - Single key lookup to check edge expiration
      - Minimal latency impact on traversal queries
      - Scales to millions of edges

      **Cleanup Behavior:**
      - Runs every 30 seconds (same interval as document TTL)
      - Leader-only operation
      - 5-second grace period for replication
      - Batched deletions (1000 edges per batch)

      ### Monitoring

      Edge TTL operations are logged separately from document TTL:
      ```
      INFO  Starting edge TTL cleanup job indexes_with_ttl=3 cleanup_interval=30s
      INFO  Cleaned up expired edges count=127 duration=89ms total_expired=5432
      ```

      Metrics tracked per graph index:
      - Total edges expired since leader became active
      - Last cleanup duration
      - Scanned vs expired edge counts

      ### Modifying Edge TTL

      **Adding TTL to existing graph index:**
      - Currently requires dropping and recreating the index
      - Edges are not preserved when index is dropped
      - Plan accordingly for production deployments

      **Removing TTL:**
      - Drop and recreate index without `ttl_duration`
      - All edges become permanent

      **Changing duration:**
      - Drop and recreate index with new `ttl_duration`
      - Existing edges are not preserved

      ### Limitations

      - **Per-index configuration**: Each graph index has its own TTL setting
      - **Edge-level timestamps**: Uses edge creation time (not document timestamps)
      - **No per-edge TTL**: All edges in a graph index share the same TTL duration
      - **Index recreation required**: Cannot modify TTL on existing graph index
      - **Clock synchronization**: Requires NTP for accurate expiration across cluster nodes

      ### Best Practices

      **Separate indexes for different TTLs:**
      ```json
      {
        "indexes": {
          "permanent_relationships": {
            "type": "graph"
          },
          "recent_activity": {
            "type": "graph",
            "ttl_duration": "7d"
          },
          "realtime_events": {
            "type": "graph",
            "ttl_duration": "1h"
          }
        }
      }
      ```

      Use multiple graph indexes when you need different expiration policies for different types of relationships.

      **Monitor cleanup logs:**
      - Watch for high edge counts requiring cleanup
      - Adjust TTL duration if cleanup becomes a bottleneck
      - Consider shorter cleanup intervals for time-sensitive use cases

      **Test before production:**
      - Verify edge expiration behavior matches expectations
      - Test cleanup performance with representative edge counts
      - Ensure traversal queries filter expired edges correctly

security:
  - BasicAuth: []
  - ApiKeyAuth: []
  - BearerAuth: []

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    Error:
      $ref: "../usermgr/api.yaml#/components/schemas/Error"
    SortDirection:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/SortDirection"
    SortField:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/SortField"
    ClusterHealth:
      type: string
      enum:
        - unknown
        - healthy
        - unhealthy
        - degraded
        - error
      description: Overall health status of the cluster
    ClusterStatus:
      type: object
      required:
        - health
      additionalProperties: true
      properties:
        health:
          $ref: "#/components/schemas/ClusterHealth"
        message:
          type: string
          description: Optional message providing details about the health status
        auth_enabled:
          type: boolean
          description: Indicates whether authentication is enabled for the cluster
          x-omitzero: false
        swarm_mode:
          type: boolean
          description: Indicates whether the cluster is running in single-node swarm mode
          x-omitzero: false
    SecretStatus:
      type: string
      enum:
        - configured_keystore
        - configured_env
        - configured_both
      description: Source of the secret configuration
    SecretEntry:
      type: object
      required:
        - key
        - status
      properties:
        key:
          type: string
          description: "Secret name (e.g., openai.api_key)"
        status:
          $ref: "#/components/schemas/SecretStatus"
        env_var:
          type: string
          description: "Corresponding environment variable name (e.g., OPENAI_API_KEY)"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecretList:
      type: object
      required:
        - secrets
      properties:
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/SecretEntry"
    SecretWriteRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: "Secret value (stored encrypted, never returned)"
    ByteRange:
      type: array
      items:
        type: string # B encoded bytes
        format: byte
      minItems: 2
      maxItems: 2
    SyncLevel:
      type: string
      enum:
        - propose
        - write
        - full_text
        - enrichments
        - aknn
      default: propose
      description: |
        Synchronization level for batch operations:
        - "propose": Wait for Raft proposal acceptance (fastest, default)
        - "write": Wait for Pebble KV write
        - "full_text": Wait for full-text index WAL write
        - "enrichments": Pre-compute enrichments before Raft proposal (synchronous enrichment generation)
        - "aknn": Wait for vector index write with best-effort synchronous embedding (falls back to async on timeout, slowest, most durable)
    ShardConfig: # Simplified from common.ShardInfo for brevity
      type: object
      required:
        - byte_range
      properties:
        byte_range:
          $ref: "#/components/schemas/ByteRange"
    CreateTableRequest:
      type: object
      properties:
        num_shards:
          type: integer
          format: uint
          description: |
            Number of shards to create for the table. Data is partitioned across shards based on key ranges.

            **Sizing Guidelines:**
            - Small datasets (<100K docs): 1-3 shards
            - Medium datasets (100K-1M docs): 3-10 shards
            - Large datasets (>1M docs): 10+ shards

            More shards enable better parallelism but increase overhead. Choose based on expected data size and query patterns.

            **When to Add More Shards:**

            Antfly supports **online shard reallocation** without downtime. Add more shards when:
            - Individual shards exceed size thresholds (configurable)
            - Query latency increases due to large shard size
            - Need better parallelism for write-heavy workloads

            Use the internal `/reallocate` endpoint to trigger automatic shard splitting:
            ```bash
            POST /_internal/v1/reallocate
            ```

            This enqueues a reallocation request that the leader processes asynchronously, splitting
            large shards and redistributing data without service interruption.

            **Advantages over Elasticsearch:**
            - Automatic shard splitting (no manual reindexing required)
            - Online operation (no downtime)
            - Transparent to applications (keys remain accessible during reallocation)
          example: 3
          # default: 1
        description:
          type: string
          maxLength: 500
          description: |
            Optional human-readable description of the table and its purpose.
            Useful for documentation and team collaboration.
          example: "User profiles with embeddings for semantic search"
        indexes:
          type: object
          description: |
            Map of index name to index configuration. Indexes enable different query capabilities:
            - Full-text indexes for BM25 search
            - Vector indexes for semantic similarity
            - Multimodal indexes for images/audio/video

            You can add multiple indexes to support different query patterns.
          additionalProperties:
            $ref: "../store/db/indexes/openapi.yaml#/components/schemas/IndexConfig"
          example:
            search_index:
              type: full_text
            embedding_index:
              type: embeddings
              dimension: 384
              embedder:
                provider: ollama
                model: all-minilm
        schema: # Optional schema for the table
          description: |
            Optional schema definition specifying field types, primary key, and TTL configuration.
            While optional, defining a schema provides type safety, optimized indexing, and better search performance.

            **Schema Features:**
            - **Field Types**: Define document structure using JSON Schema with `x-antfly-types` extensions
            - **Document TTL**: Configure automatic expiration via `ttl_duration` and optional `ttl_field`
            - **Primary Keys**: Specify unique identifier fields
            - **Validation**: Enforce schema constraints on writes

            **TTL Example:**
            ```json
            {
              "ttl_duration": "7d",
              "ttl_field": "_timestamp",
              "document_schemas": {...}
            }
            ```

            See the Table Management documentation for comprehensive TTL configuration and use cases.
          $ref: "../../lib/schema/openapi.yaml#/components/schemas/TableSchema"
        replication_sources:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationSource"
          description: |
            PostgreSQL CDC replication sources. Streams INSERT/UPDATE/DELETE changes from
            PostgreSQL tables into this Antfly table via logical replication.

            Multiple sources can feed into a single table (e.g., `users` + `scores` → Antfly `users`).
            Each source uses `on_update`/`on_delete` transforms to control how PG events map to
            Antfly document operations. Requires `wal_level=logical` on the PostgreSQL source.
    AntflyType:
      rules:
        no-unused-components: off
