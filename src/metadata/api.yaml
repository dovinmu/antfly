        table_names:
          type: array
          items:
            type: string
          description: |
            Optional list of tables to restore. If omitted, all tables in the backup are restored.
          example: ["users", "products"]
        restore_mode:
          type: string
          enum: [fail_if_exists, skip_if_exists, overwrite]
          default: fail_if_exists
          description: |
            How to handle existing tables:
            - `fail_if_exists`: Abort if any table already exists (default)
            - `skip_if_exists`: Skip existing tables, restore others
            - `overwrite`: Drop and recreate existing tables
          example: "skip_if_exists"
    ClusterRestoreResponse:
      type: object
      required:
        - tables
        - status
      properties:
        tables:
          type: array
          items:
            $ref: "#/components/schemas/TableRestoreStatus"
          description: Status of each table restore
        status:
          type: string
          enum: [triggered, partial, failed]
          description: Overall restore status
          example: "triggered"
    TableRestoreStatus:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          description: Table name
          example: "users"
        status:
          type: string
          enum: [triggered, skipped, failed]
          description: Restore status for this table
          example: "triggered"
        error:
          type: string
          description: Error message if restore failed
    BackupInfo:
      type: object
      required:
        - backup_id
        - timestamp
        - tables
        - location
      properties:
        backup_id:
          type: string
          description: The backup identifier
          example: "cluster-backup-2025-01-15"
        timestamp:
          type: string
          format: date-time
          description: When the backup was created
          example: "2025-01-15T10:30:00Z"
        tables:
          type: array
          items:
            type: string
          description: Tables included in the backup
          example: ["users", "products"]
        location:
          type: string
          description: Storage location of the backup
          example: "s3://mybucket/antfly-backups/cluster/2025-01-15"
        antfly_version:
          type: string
          description: Antfly version that created the backup
          example: "v1.0.0"
    BackupListResponse:
      type: object
      required:
        - backups
      properties:
        backups:
          type: array
          items:
            $ref: "#/components/schemas/BackupInfo"
          description: List of available backups
    QueryBuilderRequest:
      type: object
      required:
        - intent
      properties:
        session_id:
          type: string
          description: Correlation identifier for a bounded agent interaction. In Phase 1 this is echoed back to the client but does not imply server-side session persistence.
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/AgentDecision"
          description: Structured answers provided by the user as part of client-carried continuation.
        interactive:
          type: boolean
          default: true
          description: If true, the agent may return clarification questions when needed.
        max_internal_iterations:
          type: integer
          minimum: 0
          maximum: 20
          description: Additive bounded-agent field for the query builder. Phase 1 remains a single-pass generation flow, but this field is echoed in result accounting.
        max_user_clarifications:
          type: integer
          minimum: 0
          maximum: 10
          description: Maximum number of clarification turns the agent may request from the user.
        require_decision_after:
          type: integer
          minimum: 0
          maximum: 20
          description: Force a user-facing decision after this many unresolved internal passes.
        example_documents:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Optional example documents to help the query builder infer field shapes and representative values. When omitted and the table has data but no schema, the server samples up to one document automatically.
        table:
          type: string
          description: Name of the table to build query for. If provided, uses table schema for field context.
          example: "articles"
        intent:
          type: string
          description: Natural language description of the search intent
          example: "Find all published articles about machine learning from the last year"
        schema_fields:
          type: array
          items:
            type: string
          description: List of searchable field names to consider. Overrides table schema if provided.
          example: ["title", "content", "status", "published_at"]
        generator:
          $ref: "../../pkg/generating/openapi.yaml#/components/schemas/GeneratorConfig"
    QueryBuilderResult:
      type: object
      required:
        - query
      properties:
        session_id:
          type: string
          description: Correlation identifier for client-carried continuation.
        iteration:
          type: integer
          description: Number of internal passes consumed while producing this result.
        clarification_count:
          type: integer
          description: Number of user clarification turns already consumed in this interaction.
        status:
          $ref: "#/components/schemas/AgentStatus"
          description: Current status of the bounded query-builder execution.
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AgentStep"
          description: Shared bounded-agent execution trace for this query-builder run.
        remaining_internal_iterations:
          type: integer
          description: Remaining internal reasoning passes for this interaction.
        remaining_user_clarifications:
          type: integer
          description: Remaining clarification turns allowed for this interaction.
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AgentQuestion"
          description: Clarification questions exposed in the shared bounded-agent envelope.
        query:
          type: object
          description: |
            Generated search query in native Bleve format.
            Can be used directly in QueryRequest.full_text_search or filter_query.
          additionalProperties: true
          example:
            conjuncts:
              - match: "machine learning"
                field: "content"
              - term: "published"
                field: "status"
        explanation:
          type: string
          description: Human-readable explanation of what the query does and why it was structured this way
          example: "Searches for 'machine learning' in content field AND requires status to be exactly 'published'"
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Model's confidence in the generated query (0.0-1.0)
          example: 0.85
        warnings:
          type: array
          items:
            type: string
          description: Any issues, limitations, or assumptions made when generating the query
          example:
            [
              "Field 'category' not found in schema, using content field instead",
            ]

    # ==========================================
    # Retrieval Agent - Agentic document retrieval with tool calling
    # ==========================================

    IncompleteDetails:
      type: object
      description: Explains why the agent stopped before completion. Present when status is "incomplete".
      required:
        - reason
      properties:
        reason:
          type: string
          enum:
            - max_internal_iterations
            - max_tokens
            - no_tools
            - clarification_required
          description: |
            Why the agent stopped:
            - max_internal_iterations: Hit the configured max_internal_iterations limit
            - max_tokens: LLM output was truncated
            - no_tools: No tools were available for agentic mode
            - clarification_required: The agent needs a user decision before it can continue

    RetrievalStrategy:
      type: string
      enum:
        - semantic
        - bm25
        - metadata
        - tree
        - graph
        - hybrid
      description: |
        Strategy for document retrieval:
        - semantic: Vector similarity search using embeddings
        - bm25: Full-text search using BM25 scoring
        - metadata: Structured query on document fields
        - tree: Iterative tree navigation with summarization
        - graph: Relationship-based traversal
        - hybrid: Combine multiple strategies with RRF or rerank

    TreeSearchConfig:
      type: object
      description: |
        Configuration for tree search strategy. Tree search navigates hierarchical
        document structures by evaluating summaries at each level.
      required:
        - index
      properties:
        index:
          type: string
          description: Name of the graph index to use for tree navigation
          example: "doc_hierarchy"
        start_nodes:
          type: string
          description: |
            Starting nodes for tree search:
            - "$roots" - Query for root nodes (nodes with no parents)
            - Comma-separated explicit node IDs
            When omitted and combined with a QueryRequest in a RetrievalQueryRequest,
            the query results are used as start nodes.
          example: "$roots"
        max_depth:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Maximum depth to traverse in the tree
        beam_width:
          type: integer
          minimum: 1
          maximum: 20
          default: 3
          description: Number of branches to explore at each level

    RetrievalQueryRequest:
      description: |
        A query in the retrieval pipeline. Extends QueryRequest with an optional
        tree search configuration. Each query specifies its own table.

        When both search fields (semantic_search, full_text_search) and tree_search
        are provided, the search results are used as start nodes for tree navigation.
      allOf:
        - $ref: "#/components/schemas/QueryRequest"
        - type: object
          properties:
            tree_search:
              $ref: "#/components/schemas/TreeSearchConfig"
              description: Optional tree search configuration

    AgentQuestionKind:
      type: string
      enum:
        - confirm
        - single_choice
        - multi_choice
        - free_text
        - field_policy
      description: UI rendering/answer handling hint for a bounded agent question

    AgentQuestion:
      type: object
      required:
        - id
        - kind
        - question
      properties:
        id:
          type: string
          description: Stable question identifier for client-carried continuation
          example: "clarify_oauth_version"
        kind:
          $ref: "#/components/schemas/AgentQuestionKind"
        question:
          type: string
          description: The clarifying question to ask the user
        reason:
          type: string
          description: Why clarification is needed
        options:
          type: array
          items:
            type: string
          description: Optional list of choices for the user
        default_answer:
          type: string
          description: Suggested default answer when the server has a preferred choice
        affects:
          type: array
          items:
            type: string
          description: High-level result areas affected by this decision

    AgentDecision:
      type: object
      required:
        - question_id
      properties:
        question_id:
          type: string
          description: The question being answered
        answer:
          description: User answer, scalar or structured depending on the question kind
        approved:
          type: boolean
          description: Used for confirm/review steps where the draft may be accepted as-is

    AgentStatus:
      type: string
      enum:
        - clarification_required
        - completed
        - in_progress
        - incomplete
        - failed
      description: Shared bounded-agent execution status

    AgentStepKind:
      type: string
      enum:
        - tool_call
        - planning
        - classification
        - generation
        - validation
        - clarification
      description: Shared bounded-agent step category

    AgentStepStatus:
      type: string
      enum:
        - success
        - error
        - skipped
      description: Outcome of a shared agent step

    AgentStep:
      type: object
      description: A step in the shared bounded-agent execution trace
      required:
        - name
        - action
      properties:
        id:
          type: string
          description: Unique step ID for correlation and tracing
        kind:
          $ref: "#/components/schemas/AgentStepKind"
        name:
          type: string
          description: Stable step name used for correlation across JSON and SSE surfaces
        action:
          type: string
          description: What action was taken
        status:
          $ref: "#/components/schemas/AgentStepStatus"
        error_message:
          type: string
          description: Error details when status is "error"
        duration_ms:
          type: integer
          description: Server-side execution time in milliseconds
        details:
          type: object
          additionalProperties: true
          description: Additional details about the step

    # --- SSE Event Schemas for Retrieval Agent streaming ---

    SSEEvent:
      type: string
      description: SSE event types emitted by the retrieval agent streaming endpoint
      enum:
        - step_started
        - step_progress
        - step_completed
        - classification
        - reasoning
        - generation
        - followup
        - hit
        - tool_mode
        - eval
        - error
        - done

    SSEStepStarted:
      type: object
      description: Emitted when a pipeline step begins execution
      required:
        - id
        - name
        - action
      properties:
        id:
          type: string
          description: Unique step ID for correlating with step_completed
          example: "step_cr3ig20h5tbs73e3ahrg"
        kind:
          $ref: "#/components/schemas/AgentStepKind"
        name:
          type: string
          description: Stable step name used for correlation across JSON and SSE surfaces
        action:
          type: string
          description: Human-readable description of the action being taken
          example: "Searching for OAuth configuration in doc_embeddings index"

    SSEStepProgress:
      type: object
      description: |
        Emitted to report progress within a running step. The `name` field
        identifies which step this progress belongs to. Additional properties
        vary by step type (e.g., tree_search includes depth, num_nodes, sufficient, etc.).
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the step this progress belongs to
          example: "tree_search"
      additionalProperties: true

    SSEStepCompleted:
      $ref: "#/components/schemas/AgentStep"

    SSEToolMode:
      type: object
      description: Emitted when the agent selects a tool-calling mode
      required:
        - mode
      properties:
        mode:
          type: string
          description: Tool calling mode selected
          enum:
            - native
            - structured_output
        tools_count:
          type: integer
          description: Number of tools available (present for native mode)

    SSEError:
      type: object
      description: Emitted when an error occurs during retrieval
      required:
        - error
      properties:
        error:
          type: string
          description: Error message

    PruneStats:
      type: object
      description: Statistics from token-based document pruning
      properties:
        resources_kept:
          type: integer
          description: Number of resources kept after pruning
        resources_pruned:
          type: integer
          description: Number of resources pruned to fit token budget
        tokens_kept:
          type: integer
          description: Estimated tokens in kept resources
        tokens_pruned:
          type: integer
          description: Estimated tokens in pruned resources

    RetrievalAgentUsage:
      type: object
      description: Token usage and resource statistics from the retrieval agent execution
      properties:
        input_tokens:
          type: integer
          description: Total input tokens across all LLM calls
        output_tokens:
          type: integer
          description: Total output tokens across all LLM calls
        total_tokens:
          type: integer
          description: Sum of input + output tokens
        cached_input_tokens:
          type: integer
          description: Input tokens served from cache
        llm_calls:
          type: integer
          description: Number of LLM invocations made
        resources_retrieved:
          type: integer
          description: Total resources found across all search queries
        prune_stats:
          $ref: "#/components/schemas/PruneStats"
          description: Token pruning statistics, present when max_context_tokens was configured

    RetrievalAgentSteps:
      type: object
      description: |
        Configuration for the retrieval agent's pipeline steps and tool-use behavior.
        Each step can have its own generator (or chain of generators) and step-specific options.
        If a step is not configured, it is skipped (retrieval always runs).
      properties:
        tools:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ChatToolsConfig"
          description: |
            Tool configuration for the retrieval agent. Controls which tools
            are available and their settings. If not specified, tools are
            automatically determined from the table's available indexes.
        classification:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ClassificationStepConfig"
          description: |
            Configuration for query classification and transformation.
            When set, runs classification before retrieval to select the optimal
            strategy (simple/decompose/step_back/hyde) and transform the query.
        generation:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/GenerationStepConfig"
          description: |
            Configuration for generation from retrieved documents.
            When set, generates a response with citations after retrieval completes.
        followup:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/FollowupStepConfig"
          description: |
            Configuration for generating follow-up questions.
            Requires steps.generation to be set.
        confidence:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ConfidenceStepConfig"
          description: |
            Configuration for confidence assessment of the generated response.
            Requires steps.generation to be set.
        eval:
          $ref: "../../lib/ai/eval/openapi.yaml#/components/schemas/EvalConfig"
          description: |
            Configuration for inline evaluation. Runs evaluators on retrieved
            documents and/or generated response. Requires steps.generation for
            generation-quality evaluators (faithfulness, completeness, etc.).

    RetrievalAgentRequest:
      type: object
      description: |
        Request for the retrieval agent. Queries define which tables and indexes
        to search, each as a QueryRequest with optional tree search configuration.

        **Pipeline mode** (default, max_internal_iterations=0): Queries are executed
        directly without an LLM tool-calling loop.

        **Agentic mode** (max_internal_iterations > 0): The LLM decides which tools to
        call, using the queries to determine available tables and indexes.
      required:
        - query
        - queries
      properties:
        query:
          type: string
          description: User's natural language query
          example: "How do I configure OAuth?"
        queries:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalQueryRequest"
          description: |
            Queries to execute. Each query carries its own table via the
            QueryRequest table field.

            In pipeline mode (max_internal_iterations=0), these are executed directly.
            In agentic mode, these declare which table and indexes are available.
          example:
            - table: "docs"
              semantic_search: "How do I configure OAuth?"
              indexes: ["doc_embeddings"]
              limit: 10
        messages:
          type: array
          items:
            $ref: "../../lib/ai/openapi.yaml#/components/schemas/ChatMessage"
          description: Optional conversational context for the current turn. Decisions remain the authoritative continuation input for bounded agent interactions.
        agent_knowledge:
          type: string
          description: |
            Domain-specific knowledge to include in the agent's system prompt.
            Useful for providing context about the document collection.
          example: "This collection contains API documentation for the Acme product suite."
        accumulated_filters:
          type: array
          items:
            $ref: "../../lib/ai/openapi.yaml#/components/schemas/FilterSpec"
          description: |
            Pre-applied filters from prior interactions. These are applied to
            all search tool invocations.
        session_id:
          type: string
          description: Correlation identifier for a bounded agent interaction. In Phase 1 this is echoed back to the client but does not imply server-side session persistence.
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/AgentDecision"
          description: Structured answers provided by the user as part of client-carried continuation.
        interactive:
          type: boolean
          default: true
          description: If true, the agent may return clarification questions when needed.
        max_internal_iterations:
          type: integer
          minimum: 0
          maximum: 20
          default: 0
          description: |
            Maximum number of internal tool-calling rounds.

            - 0: Pipeline mode — execute provided queries directly, no LLM loop
            - 1+: Agentic mode — LLM decides which tools to call
        max_user_clarifications:
          type: integer
          minimum: 0
          maximum: 10
          description: Maximum number of clarification turns the agent may request from the user.
        require_decision_after:
          type: integer
          minimum: 0
          maximum: 20
          description: Force a user-facing decision after this many unresolved internal passes.
        max_context_tokens:
          type: integer
          description: |
            Maximum tokens for document context in tool responses. Documents
            exceeding this limit are pruned to fit.
        reserve_tokens:
          type: integer
          description: |
            Tokens to reserve for system prompt, answer generation, and other overhead.
            Subtracted from max_context_tokens to determine available context budget.
            Defaults to 4000 if max_context_tokens is set.
          default: 4000
          minimum: 0
          example: 4000
        stream:
          type: boolean
          default: true
          description: Enable SSE streaming vs JSON response
        generator:
          $ref: "../../pkg/generating/openapi.yaml#/components/schemas/GeneratorConfig"
          description: Generator for the retrieval agent's LLM calls
        chain:
          type: array
          items:
            $ref: "../../pkg/generating/openapi.yaml#/components/schemas/ChainLink"
          description: Chain of generators
        steps:
          $ref: "#/components/schemas/RetrievalAgentSteps"
          description: Tool and step configuration
        document_renderer:
          type: string
          description: |
            Handlebars template for rendering documents in the generation prompt.
            Default uses TOON format for token efficiency.
            Requires steps.generation to be set.
          example: "{{encodeToon this.fields}}"

    RetrievalAgentResult:
      type: object
      description: Result from the retrieval agent
      required:
        - hits
        - status
      properties:
        id:
          type: string
          description: Unique response ID for logging and tracing
          example: "ragr_cr3ig20h5tbs73e3ahrg"
        model:
          type: string
          description: LLM model used for generation
          example: "gemini-2.0-flash"
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the response was created
        status:
          $ref: "#/components/schemas/AgentStatus"
          description: Current status of the bounded agent execution
        incomplete_details:
          $ref: "#/components/schemas/IncompleteDetails"
          description: Present when status is "incomplete" — explains why
        usage:
          $ref: "#/components/schemas/RetrievalAgentUsage"
          description: Token usage and resource statistics from this execution
        hits:
          type: array
          items:
            $ref: "#/components/schemas/QueryHit"
          description: Retrieved query hits
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AgentStep"
          description: Shared bounded-agent execution trace for this retrieval run.
        strategy_used:
          $ref: "#/components/schemas/RetrievalStrategy"
          description: Primary strategy that was used (optional in agentic mode)
        session_id:
          type: string
          description: Correlation identifier for client-carried continuation.
        iteration:
          type: integer
          description: Current internal iteration count for this bounded session.
        clarification_count:
          type: integer
          description: Number of user clarification turns already consumed in this session.
        remaining_internal_iterations:
          type: integer
          description: Remaining internal reasoning/tool-use iterations for this session.
        remaining_user_clarifications:
          type: integer
          description: Remaining clarification turns allowed for this session.
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AgentQuestion"
          description: Clarification questions exposed in the shared bounded-agent envelope.
        applied_filters:
          type: array
          items:
            $ref: "../../lib/ai/openapi.yaml#/components/schemas/FilterSpec"
          description: Filters that were applied during retrieval
        tool_calls_made:
          type: integer
          description: Total number of tool calls made during retrieval
        messages:
          type: array
          items:
            $ref: "../../lib/ai/openapi.yaml#/components/schemas/ChatMessage"
          description: |
            Optional conversational context including tool calls and responses.
            Decisions remain the authoritative continuation input for bounded agent interactions.
        classification:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ClassificationTransformationResult"
          description: |
            Query classification and transformation result. Present when
            steps.classification was configured. Includes strategy, semantic_query,
            sub_questions (decompose), step_back_query, and reasoning.
        generation:
          type: string
          description: |
            Generated response in markdown format. Present when steps.generation
            was configured.
        generation_confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Confidence in the generated response (requires steps.confidence)
        context_relevance:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Relevance of retrieved documents to the query (requires steps.confidence)
        followup_questions:
          type: array
          items:
            type: string
          description: Suggested follow-up questions (requires steps.followup)
        eval_result:
          $ref: "../../lib/ai/eval/openapi.yaml#/components/schemas/EvalResult"
          description: Evaluation results when steps.eval was configured

    # ==========================================
    # Answer Agent (DEPRECATED) - Backward-compatible wrapper for Retrieval Agent
    # ==========================================

    AnswerAgentSteps:
      type: object
      deprecated: true
      description: |
        DEPRECATED: Use RetrievalAgentSteps instead.
        Configuration for the answer agent's pipeline steps.
      properties:
        classification:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ClassificationStepConfig"
          description: Configuration for query classification and transformation.
        answer:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/GenerationStepConfig"
          description: |
            DEPRECATED: Use steps.generation on RetrievalAgentRequest instead.
            Configuration for answer generation from retrieved documents.
        followup:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/FollowupStepConfig"
          description: Configuration for generating follow-up questions.
        confidence:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ConfidenceStepConfig"
          description: Configuration for confidence assessment.

    AnswerAgentRequest:
      type: object
      deprecated: true
      description: |
        DEPRECATED: Use RetrievalAgentRequest instead.
        Request for the answer agent. Accepts the old request format and
        internally delegates to the retrieval agent.
      required:
        - query
        - queries
      properties:
        query:
          type: string
          description: User's natural language query
        queries:
          type: array
          items:
            $ref: "#/components/schemas/QueryRequest"
          description: Queries to execute. Each query specifies its own table.
        with_streaming:
          type: boolean
          default: true
          description: |
            DEPRECATED: Use stream on RetrievalAgentRequest instead.
            Enable SSE streaming vs JSON response.
        generator:
          $ref: "../../pkg/generating/openapi.yaml#/components/schemas/GeneratorConfig"
          description: Generator for LLM calls
        chain:
          type: array
          items:
            $ref: "../../pkg/generating/openapi.yaml#/components/schemas/ChainLink"
          description: Chain of generators
        agent_knowledge:
          type: string
          description: Domain-specific knowledge for the agent
        max_context_tokens:
          type: integer
          description: Maximum tokens for document context
        reserve_tokens:
          type: integer
          description: Tokens to reserve for overhead
          default: 4000
        steps:
          $ref: "#/components/schemas/AnswerAgentSteps"
          description: Step configuration
        eval:
          $ref: "../../lib/ai/eval/openapi.yaml#/components/schemas/EvalConfig"
          description: |
            DEPRECATED: Use steps.eval on RetrievalAgentRequest instead.
            Evaluation configuration (moved to steps.eval in new API).
        without_generation:
          type: boolean
          default: false
          description: |
            DEPRECATED: Omit steps.generation on RetrievalAgentRequest instead.
            If true, skip the generation step.

    AnswerAgentResult:
      type: object
      deprecated: true
      description: |
        DEPRECATED: Use RetrievalAgentResult instead.
        Result from the answer agent.
      properties:
        answer:
          type: string
          description: |
            DEPRECATED: Use generation on RetrievalAgentResult instead.
            Generated answer in markdown format.
        answer_confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: |
            DEPRECATED: Use generation_confidence on RetrievalAgentResult instead.
            Confidence in the generated answer.
        context_relevance:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Relevance of retrieved documents to the query
        classification_transformation:
          $ref: "../../lib/ai/openapi.yaml#/components/schemas/ClassificationTransformationResult"
          description: |
            DEPRECATED: Use classification on RetrievalAgentResult instead.
            Query classification and transformation result.
        query_results:
          type: array
          items:
            $ref: "#/components/schemas/QueryResult"
          description: |
            DEPRECATED: Use hits on RetrievalAgentResult instead.
            Query results grouped by table.
        followup_questions:
          type: array
          items:
            type: string
          description: Suggested follow-up questions
        eval_result:
          $ref: "../../lib/ai/eval/openapi.yaml#/components/schemas/EvalResult"
          description: Evaluation results

    # ==========================================
    # Shared value type for the embeddings map (dense or sparse).
    Embedding:
      oneOf:
        - type: array
          items:
            type: number
            format: float
          description: Dense embedding as an array of floats, e.g. `[0.1, 0.2, 0.3]`
        - type: object
          required: [indices, values]
          properties:
            indices:
              type: array
              items:
                type: integer
                x-go-type: uint32
            values:
              type: array
              items:
                type: number
                format: float
          description: Sparse embedding with `indices` and `values` arrays
        - type: string
          format: byte
          description: |
            Packed dense embedding as a base64-encoded string of raw little-endian float32 bytes.
            This is ~4x more compact than the JSON array format. For example, a 3-dimensional
            vector `[1.0, 2.0, 3.0]` is encoded as base64(12 bytes of little-endian float32s).
        - type: object
          required: [packed_indices, packed_values]
          properties:
            packed_indices:
              type: string
              format: byte
              description: Base64-encoded little-endian uint32 bytes for sparse indices
            packed_values:
              type: string
              format: byte
              description: Base64-encoded little-endian float32 bytes for sparse values
          description: |
            Packed sparse embedding with base64-encoded indices and values.
            Same semantics as the sparse object format but more compact on the wire.

    # Generation Agent - Document-to-response generation
    # ==========================================

    QueryRequest: # Based on remoteindex.Query
      type: object
      properties:
        table:
          type: string
          description: Name of the table to query. Optional for global queries.
          example: "wikipedia"
        full_text_search:
          allOf:
            - $ref: "../../bleve-query-openapi.yaml#/components/schemas/Query"
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
              type: object
              additionalProperties: true
          description: |
            Bleve query for full-text search. Supports all Bleve query types.

            See bleve-query-openapi.yaml for complete type definitions.

            Examples:
            - Simple: `{"query": "computer"}`
            - Field-specific: `{"query": "body:computer"}`
            - Boolean: `{"query": "+artificial +intelligence"}`
            - Range: `{"query": "year:>2020"}`
            - Phrase: `{"query": "\"exact phrase\""}`
          example:
            query: "+body:computer +category:technology"
            boost: 1.0
        semantic_search:
          type: string
          description: |
            Natural language query for vector similarity search. Results are ranked by semantic similarity
            to the query and can be combined with full_text_search using Reciprocal Rank Fusion (RRF).

            The semantic_search string is automatically embedded using the configured embedding model
            for the specified indexes. Use `embedding_template` for multimodal queries.
          example: "artificial intelligence and machine learning applications"
        embedding_template:
          type: string
          description: |
            Optional Handlebars template for multimodal embedding of the semantic_search query.
            The template has access to `this` which contains the semantic_search string value.

            Use this when you want to embed multimodal content (images, PDFs, etc.) instead of
            just text. The template is rendered using dotprompt with access to remote content helpers.

            **Available Helpers**:
            - `remoteMedia url=<url>` - Fetches and embeds remote images/media
            - `remotePDF url=<url>` - Fetches and extracts content from PDFs
            - `remoteText url=<url>` - Fetches and includes remote text content

            **Examples**:
            - PDF search: `{{remotePDF url=this}}`
            - Image search: `{{remoteMedia url=this}}`
            - Mixed: `Search for: {{this}} {{#if this}}{{remoteMedia url=this}}{{/if}}`

            When not specified, the semantic_search string is embedded as plain text.
          example: "{{remotePDF url=this}}"
        indexes:
          type: array
          items:
            type: string
          description: |
            List of vector index names to use for semantic search. Required when using semantic_search.
            Multiple indexes can be specified, and their results will be merged using RRF.
          example: ["title_body_nomic", "description_embedding"]
        filter_prefix:
          type: string
          format: byte
          description: |
            Filter results by key prefix. Only returns documents whose keys start with this string.
            Applied before scoring to improve performance.

            Common use cases:
            - Multi-tenant filtering: `"tenant:acme:"`
            - User-specific data: `"user:123:"`
            - Document type filtering: `"article:"`
        filter_query:
          allOf:
            - $ref: "../../bleve-query-openapi.yaml#/components/schemas/Query"
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
          description: |
            Bleve query applied as an AND condition. Documents must match both the main query
            and this filter. Applied before scoring for better performance.

            See bleve-query-openapi.yaml for complete type definitions.

            Use for:
            - Status filtering: `"status:published"`
            - Date ranges: `"created_at:>2023-01-01"`
            - Category filtering: `"+category:technology +language:en"`
          example:
            query: "+category:technology +year:>2020"
            boost: 1.0
        exclusion_query:
          allOf:
            - $ref: "../../bleve-query-openapi.yaml#/components/schemas/Query"
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
          description: |
            Bleve query applied as a NOT condition. Documents matching this query are excluded
            from results. Applied before scoring.

            See bleve-query-openapi.yaml for complete type definitions.

            Use for:
            - Excluding drafts: `"status:draft"`
            - Removing deprecated content: `"deprecated:true"`
            - Filtering out archived items: `"status:archived"`
          example:
            query: "category:deprecated OR status:archived"
            boost: 1.0
        aggregations:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AggregationRequest"
          description: |
            Aggregation requests for computing metrics and bucketing results.
            Each key is a user-defined name for the aggregation, and the value specifies the aggregation configuration.

            Supports metric aggregations (sum, avg, min, max, count, stats, cardinality),
            bucketing aggregations (terms, range, date_range, histogram, date_histogram),
            geo aggregations (geohash_grid, geo_distance), and analytics (significant_terms).

            Example:
            ```json
            {
              "price_stats": {
                "type": "stats",
                "field": "price"
              },
              "categories": {
                "type": "terms",
                "field": "category",
                "size": 10
              }
            }
            ```
        embeddings:
          type: object
          description: |
            Pre-computed embeddings to use for semantic searches instead of embedding the semantic_search string.
            The keys are the index names. Values can be either:
            - **Dense (array)**: an array of floats, e.g. `[0.1, 0.2, 0.3]`
            - **Dense (packed)**: a base64 string of little-endian float32 bytes (~4x more compact)
            - **Sparse**: an object with `indices` (array of ints) and `values` (array of floats),
              e.g. `{"indices": [1, 5, 100], "values": [0.3, 0.7, 0.1]}`
            - **Sparse (packed)**: an object with `packed_indices` (base64 uint32 LE) and `packed_values` (base64 float32 LE)

            Use when you've already generated embeddings on the client side to avoid redundant embedding calls.
          additionalProperties:
            $ref: "#/components/schemas/Embedding"
        search_effort:
          x-go-type-skip-optional-pointer: false
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.5
          description: |
            Controls the vector search recall/latency tradeoff for semantic searches.

            - `0.0` = fastest, lowest recall
            - `0.5` = balanced default
            - `1.0` = highest recall

            When omitted, Antfly uses the balanced default effort (`0.5`) unless
            lower-level vector search overrides are provided internally.
          example: 0.5
        fields:
          type: array
          description: |
            List of fields to include in the results. If not specified, all fields are returned.
            Use to reduce response size and improve performance.
          items:
            type: string
          example: ["title", "url", "summary", "created_at"]
        limit:
          type: integer
          description: |
            Maximum number of results to return. For semantic_search, this is the topk parameter.
            Default varies by query type (typically 10).
          example: 20
        offset:
          type: integer
          description: |
            Number of results to skip for pagination. Only available for full_text_search queries.
            Not supported for semantic_search due to vector index limitations.
          example: 0
        order_by:
          type: array
          items:
            $ref: '#/components/schemas/SortField'
          description: |
            Sort order for results. Array of sort fields with direction.
            Only applicable for full_text_search queries. Semantic searches are always sorted by similarity score.
          example:
            - field: created_at
              desc: true
            - field: score
              desc: true
        search_after:
          type: array
          items:
            type: string
          description: |
            Cursor for forward pagination. Pass the `_sort` values from the last hit
            of the previous page. Mutually exclusive with `offset`.
            Requires `order_by` to be set. Only supported for full_text_search queries.
        search_before:
          type: array
          items:
            type: string
          description: |
            Cursor for backward pagination. Pass the `_sort` values from the first hit
            of the current page. Mutually exclusive with `offset`.
            Requires `order_by` to be set. Only supported for full_text_search queries.
        distance_under:
          x-go-type-skip-optional-pointer: false
          type: number
          format: float
          description: |
            Maximum distance threshold for semantic similarity search. Results with distance
            greater than this value are excluded. Lower distances indicate higher similarity.

            Useful for filtering out low-confidence matches.
          example: 0.5
        distance_over:
          x-go-type-skip-optional-pointer: false
          type: number
          format: float
          description: |
            Minimum distance threshold for semantic similarity search. Results with distance
            less than this value are excluded.

            Useful for excluding near-exact duplicates or finding dissimilar documents.
          example: 0.1
        merge_config:
          $ref: "../store/db/indexes/openapi.yaml#/components/schemas/MergeConfig"
          description: |
            Configuration for merging full-text and semantic search results.
            Only applies when both `full_text_search` and `semantic_search` are specified.
        count:
          type: boolean
          description: |
            If true, returns only the total count of matching documents without retrieving the actual documents.
            Useful for pagination and displaying result counts.
          example: false
        profile:
          type: boolean
          description: |
            If true, includes detailed execution profiling in the response.
            Adds a `profile` object with per-phase timing breakdowns, shard statistics,
            join metadata, reranker stats, and merge details.
            Has minor performance overhead — not recommended for production traffic.
          example: false
        reranker:
          $ref: "../../lib/reranking/openapi.yaml#/components/schemas/RerankerConfig"
          description: |
            Optional reranker configuration to improve result relevance.

            Rerankers use cross-encoder models that score query-document pairs directly,
            providing more accurate relevance scores than embedding similarity alone.

            **When to use:**
            - Results need high precision (e.g., RAG, question answering)
            - You have semantic or hybrid search results to refine
            - Latency trade-off is acceptable (reranking adds 100-500ms typically)

            **Best practice:** Retrieve more results (limit: 50-100) then rerank to final size.

            Example:
            ```json
            {
              "provider": "termite",
              "model": "cross-encoder/ms-marco-MiniLM-L-6-v2",
              "field": "content"
            }
            ```
        analyses:
          $ref: "#/components/schemas/Analyses"
        graph_searches:
          type: object
          additionalProperties:
            $ref: "../store/db/indexes/openapi.yaml#/components/schemas/GraphQuery"
          description: |
            Declarative graph queries to execute after full-text/vector searches.
            Results can reference search results using node selectors like $full_text_results.
        expand_strategy:
          type: string
          enum:
            - union
            - intersection
          description: |
            Strategy for merging graph results with search results:
            - union: Include nodes from both search and graph results
            - intersection: Only include nodes appearing in both
        document_renderer:
          type: string
          description: |
            Optional Handlebars template string for rendering document content in RAG queries.
            Template has access to document fields via `{{this.fields.fieldName}}`.

            **Default**: Uses TOON (Token-Oriented Object Notation) format for 30-60% token reduction:
            ```handlebars
            {{encodeToon this.fields}}
            ```

            **Available Helpers**:
            - `encodeToon` - Renders fields in compact TOON format with configurable options:
              - `lengthMarker` (bool): Add # prefix to array counts (default: true)
              - `indent` (int): Indentation spacing (default: 2)
              - `delimiter` (string): Field separator for tabular arrays
            - `scrubHtml` - Removes HTML tags and extracts text
            - `media` - Wraps data URIs for GenKit multimodal support
            - `eq` - Equality comparison for conditionals

            **Examples**:
            - Basic TOON: `{{encodeToon this.fields}}`
            - Compact TOON: `{{encodeToon this.fields lengthMarker=false indent=0}}`
            - Tabular data: `{{encodeToon this.fields delimiter="\t"}}`
            - Custom template: `Title: {{this.fields.title}}\nBody: {{this.fields.body}}`
            - Traditional format: `{{#each this.fields}}{{@key}}: {{this}}\n{{/each}}`

            TOON format produces compact, LLM-optimized output like:
            ```
            title: Introduction to Vector Search
            author: Jane Doe
            tags[#3]: ai,search,ml
            ```

            **References**:
            - TOON Specification: https://github.com/toon-format/toon
            - Go Implementation: https://github.com/alpkeskin/gotoon
          example: "{{encodeToon this.fields}}"
        pruner:
          $ref: "../store/db/indexes/openapi.yaml#/components/schemas/Pruner"
          description: |
            Optional result pruning configuration to filter low-relevance results.

            Pruning helps detect "elbows" in score distributions and removes
            results that are significantly worse than top matches.

            **Common patterns:**
            - RAG queries: Use `max_score_gap_percent: 30` to stop at quality drop-offs
            - Strict matching: Use `min_score_ratio: 0.7` for high-quality results only
            - Combine both for best results

            Example:
            ```json
            {
              "min_score_ratio": 0.5,
              "max_score_gap_percent": 25.0,
              "min_absolute_score": 0.3
            }
            ```
        join:
          $ref: "#/components/schemas/JoinClause"
          description: |
            Cross-table join configuration for combining results from multiple tables.

            Joins allow you to enrich query results with data from related tables,
            similar to SQL JOINs but optimized for distributed execution.

            **Join Types:**
            - `inner`: Only return rows that have matches in both tables
            - `left`: Return all rows from the primary table, with NULL for non-matching right rows
            - `right`: Return all rows from the joined table, with NULL for non-matching left rows

            **Join Strategies** (auto-selected based on table sizes):
            - `broadcast`: Small table broadcast to all shards (best for dimension tables < 10MB)
            - `index_lookup`: Batch key lookups using indexes (best for selective joins)
            - `shuffle`: Hash-partition both tables (best for large-large joins)

            **Example - Enrich orders with customer data:**
            ```json
            {
              "table": "orders",
              "full_text_search": {"query": "status:pending"},
              "join": {
                "right_table": "customers",
                "join_type": "inner",
                "on": {
                  "left_field": "customer_id",
                  "right_field": "id"
                },
                "right_filters": {
                  "filter_query": {"query": "tier:premium"}
                }
              },
              "fields": ["order_id", "amount", "customers.name", "customers.email"]
            }
            ```

            **Multi-way joins** (nested):
            ```json
            {
              "table": "orders",
              "join": {
                "right_table": "customers",
                "on": {"left_field": "customer_id", "right_field": "id"},
                "nested_join": {
                  "right_table": "addresses",
                  "on": {"left_field": "customers.address_id", "right_field": "id"}
                }
              }
            }
            ```

            **Performance Tips:**
            - Filter the driving table first to reduce join input size
            - Put the smaller table on the right side for broadcast joins
            - Use indexed fields in join conditions for index_lookup strategy
            - Limit result fields to reduce data transfer
        foreign_sources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ForeignSource"
          description: |
            Map of table name to foreign data source configuration for query-time federated access.
            When a table name referenced in this query (or in a join's `right_table`) appears as a key
            here, the query is routed to the external database instead of Antfly shards.

            This enables joining Antfly search results with structured relational data (customer records,
            product catalogs, etc.) without ingesting that data into Antfly.

            **Supported operations on foreign tables:** filter_query, field selection, limit/offset.
            **Not supported:** full_text_search, semantic_search, graph_searches, aggregations, reranker.

            **Example - Join Antfly products with Postgres customers:**
            ```json
            {
              "table": "products",
              "full_text_search": {"query": "category:electronics"},
              "join": {
                "right_table": "pg_customers",
                "on": {"left_field": "customer_id", "right_field": "id"}
              },
              "foreign_sources": {
                "pg_customers": {
                  "type": "postgres",
                  "dsn": "${secret:pg_dsn}",
                  "postgres_table": "customers"
                }
              }
            }
            ```
    Analyses:
      x-go-type-skip-optional-pointer: false
      type: object
      properties:
        pca:
          type: boolean
        tsne:
          type: boolean
    JoinClause:
      type: object
      description: |
        Configuration for joining data from another table.
        Supports inner, left, and right joins with automatic strategy selection.
      required:
        - right_table
        - "on"
      properties:
        right_table:
          type: string
          description: Name of the table to join with.
          example: "customers"
        join_type:
          $ref: "#/components/schemas/JoinType"
          description: Type of join to perform. Defaults to "inner".
        "on":
          $ref: "#/components/schemas/JoinCondition"
          description: Join condition specifying which fields to match.
        right_filters:
          $ref: "#/components/schemas/JoinFilters"
          description: |
            Optional filters to apply to the right table before joining.
            Use to reduce the amount of data being joined.
        right_fields:
          type: array
          items:
            type: string
          description: |
            Fields to include from the right table in the result.
            If not specified, all fields from the right table are included.
            Fields are prefixed with the right table name in the result.
          example: ["name", "email", "tier"]
        strategy_hint:
          $ref: "#/components/schemas/JoinStrategy"
          description: |
            Optional hint for which join strategy to use.
            If not specified, the planner automatically selects based on table statistics.
        nested_join:
          type: object
          allOf:
            - $ref: "#/components/schemas/JoinClause"
          nullable: true
          x-go-type-skip-optional-pointer: false
          description: |
            Optional nested join for multi-way joins.
            The nested join operates on the result of the current join.
    JoinType:
      type: string
      enum:
        - inner
        - left
        - right
      default: inner
      description: |
        Type of join to perform:
        - `inner`: Only return rows with matches in both tables
        - `left`: Return all rows from left table, NULL for non-matching right rows
        - `right`: Return all rows from right table, NULL for non-matching left rows
    JoinCondition:
      type: object
      description: Condition for matching rows between tables.
      required:
        - left_field
        - right_field
      properties:
        left_field:
          type: string
          description: Field from the left (primary) table to match on.
          example: "customer_id"
        right_field:
          type: string
          description: Field from the right (joined) table to match on.
          example: "id"
        operator:
          $ref: "#/components/schemas/JoinOperator"
          description: Comparison operator. Defaults to "eq" (equality).
    JoinOperator:
      type: string
      enum:
        - eq
        - neq
        - lt
        - lte
        - gt
        - gte
      default: eq
      description: |
        Comparison operator for join condition:
        - `eq`: Equal (default)
        - `neq`: Not equal
        - `lt`: Less than
        - `lte`: Less than or equal
        - `gt`: Greater than
        - `gte`: Greater than or equal
    JoinFilters:
      type: object
      description: Filters to apply to a table before joining.
      properties:
        filter_query:
          allOf:
            - $ref: "../../bleve-query-openapi.yaml#/components/schemas/Query"
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
          description: Bleve query to filter rows before joining.
        filter_prefix:
          type: string
          format: byte
          description: Key prefix filter for the table.
        limit:
          type: integer
          description: Maximum number of rows to include from this table.
    JoinStrategy:
      type: string
      enum:
        - broadcast
        - index_lookup
        - shuffle
      description: |
        Strategy for executing the join:
        - `broadcast`: Broadcast small table to all shards of large table.
          Best for dimension tables < 10MB. O(small_table) memory per shard.
        - `index_lookup`: Use batch key lookups via indexes.
          Best for selective joins with indexed join keys. Low memory overhead.
        - `shuffle`: Hash-partition both tables by join key.
          Best for large-large table joins. Requires data movement.
    QueryProfile:
      type: object
      description: |
        Detailed execution profiling for a query. Present in the response
        when the request sets `profile: true`.
      properties:
        shards:
          $ref: "#/components/schemas/ShardsProfile"
          description: Shard-level execution statistics.
        join:
          $ref: "#/components/schemas/JoinProfile"
          description: Join execution statistics (present when query used a join).
        reranker:
          $ref: "#/components/schemas/RerankerProfile"
          description: Reranking statistics (present when a reranker was used).
        merge:
          $ref: "#/components/schemas/MergeProfile"
          description: Result merge statistics (present for hybrid search).
    ShardsProfile:
      type: object
      description: Shard-level execution statistics.
      properties:
        total:
          type: integer
          description: Total shards targeted by the query.
        successful:
          type: integer
          description: Shards that returned results successfully.
        failed:
          type: integer
          description: Shards that failed during execution.
    JoinProfile:
      type: object
      description: Join execution statistics.
      properties:
        strategy_used:
          $ref: "#/components/schemas/JoinStrategy"
          description: The join strategy that was used.
        left_rows_scanned:
          type: integer
          format: int64
          description: Number of rows scanned from the left table.
        right_rows_scanned:
          type: integer
          format: int64
          description: Number of rows scanned from the right table.
        rows_matched:
          type: integer
          format: int64
          description: Number of rows that matched the join condition.
        rows_unmatched_left:
          type: integer
          format: int64
          description: Number of left rows without a match (for left/full joins).
        rows_unmatched_right:
          type: integer
          format: int64
          description: Number of right rows without a match (for right/full joins).
        duration_ms:
          type: integer
          format: int64
          description: Time spent executing the join in milliseconds.
    RerankerProfile:
      type: object
      description: Reranking execution statistics.
      properties:
        model:
          type: string
          description: Reranker model that was used.
        documents_reranked:
          type: integer
          description: Number of documents that were reranked.
        duration_ms:
          type: integer
          format: int64
          description: Time spent reranking in milliseconds.
    MergeProfile:
      type: object
      description: Result merge statistics for hybrid search.
      properties:
        strategy:
          $ref: "../store/db/indexes/openapi.yaml#/components/schemas/MergeStrategy"
          description: Merge strategy that was used.
        full_text_hits:
          type: integer
          description: Number of hits from full-text search before merge.
        semantic_hits:
          type: integer
          description: Number of hits from semantic search before merge.
        duration_ms:
          type: integer
          format: int64
          description: Time spent merging results in milliseconds.
    TableStatistics:
      type: object
      description: Statistics about a table used for query planning.
      properties:
        row_count:
          type: integer
          format: int64
          description: Approximate number of rows in the table.
        size_bytes:
          type: integer
          format: int64
          description: Approximate size of the table in bytes.
        field_stats:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FieldStatistics"
          description: Per-field statistics for query optimization.
        last_updated:
          type: string
          format: date-time
          description: When these statistics were last computed.
    FieldStatistics:
      type: object
      description: Statistics about a specific field.
      properties:
        cardinality:
          type: integer
          format: int64
          description: Approximate number of unique values (via HyperLogLog).
        null_count:
          type: integer
          format: int64
          description: Number of rows with null values for this field.
        min_value:
          description: Minimum value for numeric/date fields.
        max_value:
          description: Maximum value for numeric/date fields.
        avg_size:
          type: integer
          description: Average size in bytes for variable-length fields.
    AnalysesResult:
      x-go-type-skip-optional-pointer: false
      type: object
      properties:
        pca:
          type: array
          items:
            type: number
            format: float
            x-go-type: float64
        tsne:
          type: array
          items:
            type: number
            format: float
            x-go-type: float64
    QueryHit:
      type: object
      description: A single query result hit
      required:
        - _id
        - _score
      properties:
        _id:
          type: string
          description: ID of the record.
          x-go-name: ID
        _score:
          type: number
          format: float
          x-go-type: float64
          description: Relevance score of the hit.
          x-go-name: score
        _index_scores:
          type: object # map[string]float64
          additionalProperties: true
          description: Scores partitioned by index when using RRF search.
          x-go-name: indexScores
        _source:
          type: object
          additionalProperties: true # map[string]any for field values
          x-go-name: source
        _sort:
          type: array
          items:
            type: string
          description: |
            Sort key values for this hit. Pass as search_after or search_before
            to paginate to the next/previous page. Only present when order_by is specified.
          x-go-name: sort
    QueryHits:
      x-omitempty: false
      x-omitzero: false
      type: object
      description: A list of query hits.
      properties:
        total:
          type: integer
          format: uint64
          description: Total number of hits available.
          x-omitzero: false
        hits:
          x-omitempty: false
          x-omitzero: false
          type: array
          items:
            $ref: "#/components/schemas/QueryHit"
        max_score:
          type: number
          format: float
          x-go-type: float64
          description: Maximum score of the results.
    QueryResponses:
      type: object
      description: Responses from multiple query operations.
      properties:
        responses:
          type: array
          items:
            $ref: "#/components/schemas/QueryResult"
    QueryResult:
      type: object
      description: Result of a query operation as an array of results and a count.
      required:
        - took
        - status
      properties:
        hits:
          $ref: "#/components/schemas/QueryHits"
        aggregations:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AggregationResult"
          description: |
            Aggregation results keyed by the user-defined aggregation names from the request.
            Contains computed metrics or buckets depending on the aggregation type.
        analyses:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AnalysesResult"
          description: Analysis results like PCA and t-SNE per index embeddings.
        graph_results:
          type: object
          additionalProperties:
            $ref: "../store/db/indexes/openapi.yaml#/components/schemas/GraphQueryResult"
          description: Results from declarative graph queries.
        profile:
          x-go-type-skip-optional-pointer: false
          allOf:
            - $ref: "#/components/schemas/QueryProfile"
          description: |
            Detailed execution profile (present when `profile: true` in request).
        took:
          type: integer
          format: int64
          x-go-type: time.Duration
          description: Duration of the query in milliseconds.
        status:
          type: integer
          format: int32
          description: HTTP status code of the query operation.
        error:
          type: string
          description: Error message if the query failed.
        table:
          type: string
          description: Which table this result came from
    LinearMergePageStatus:
      type: string
      enum:
        - success
        - partial
        - error
      description: |
        Status of a linear merge page operation:
        - "success": All records in batch processed successfully
        - "partial": Processing stopped at shard boundary, client should retry with next_cursor
        - "error": Fatal error occurred, no records processed successfully
    LinearMergeRequest:
      type: object
      required:
        - records
      description: |
        Linear merge operation for syncing sorted records from external sources.
        Use this to keep Antfly in sync with an external database or data source.

        **How it works:**
        1. Send sorted records from your external source
        2. Server upserts records that exist in your batch
        3. Server deletes Antfly records in the key range that are absent from your batch
        4. If stopped at shard boundary, use next_cursor for next request

        **WARNING:** Not safe for concurrent operations with overlapping key ranges.
      properties:
        records:
          type: object
          additionalProperties: true
          description: |
            Map of resource ID to resource object: {"resource_id_1": {...}, "resource_id_2": {...}}

            Requirements:
            - Keys must be sorted lexicographically by your client
            - Server will process keys in sorted order
            - Use consistent key naming (e.g., all start with same prefix)

            This format avoids duplicate IDs and matches Antfly's batch write interface.
          example:
            "product:001":
              name: "Laptop"
              price: 999.99
            "product:002":
              name: "Mouse"
              price: 29.99
            "product:003":
              name: "Keyboard"
              price: 79.99
        last_merged_id:
          type: string
          description: |
            ID of last record from previous merge request.
            - First request: Use empty string ""
            - Subsequent requests: Use next_cursor from previous response
            - Defines lower bound of key range to process

            This enables pagination for large datasets.
          example: "product:003"
        dry_run:
          type: boolean
          default: false
          description: |
            If true, returns what would be deleted without making changes.

            Use cases:
            - Validate sync behavior before committing
            - Check which records will be removed
            - Test key range boundaries

            Response includes deleted_ids array when dry_run=true.
          example: false
        sync_level:
          $ref: "#/components/schemas/SyncLevel"
    FailedOperation:
      type: object
      properties:
        id:
          type: string
        operation:
          type: string
          enum: [upsert, delete]
        error:
          type: string
    KeyRange:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
      description: Key range processed in this request
    LinearMergeResult:
      type: object
      required:
        - status
        - upserted
        - deleted
        - skipped
        - next_cursor
      properties:
        status:
          $ref: "#/components/schemas/LinearMergePageStatus"
        upserted:
          type: integer
          description: Records inserted or updated (0 if dry_run=true)
        skipped:
          type: integer
          description: Records skipped because content hash matched (unchanged)
        deleted:
          type: integer
          description: Records deleted or would be deleted (if dry_run=true)
        deleted_ids:
          type: array
          items:
            type: string
          description: IDs that were deleted (or would be deleted if dry_run=true). Only included if dry_run=true.
        failed:
          type: array
          items:
            $ref: "#/components/schemas/FailedOperation"
        next_cursor:
          type: string
          description: ID of last record in this batch (use for next request)
        key_range:
          $ref: "#/components/schemas/KeyRange"
        keys_scanned:
          type: integer
          description: Total number of keys scanned from Antfly during range query
        message:
          type: string
          description: Additional information (e.g., "stopped at shard boundary", "dry run - no changes made")
        took:
          type: integer
          format: int64
          x-go-type: time.Duration
    # Graph API Schemas
    Edge:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/Edge"
    EdgeDirection:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/EdgeDirection"
    TraversalRules:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/TraversalRules"
    TraversalResult:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/TraversalResult"
    EdgesResponse:
      type: object
      properties:
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
        count:
          type: integer
          description: Total number of edges returned
    TraverseResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/TraversalResult"
        count:
          type: integer
          description: Total number of results
    PathFindWeightMode:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/PathFindWeightMode"
    PathFindRequest:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/PathFindRequest"
    PathFindResult:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/PathFindResult"
    Path:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/Path"
    PathEdge:
      $ref: "../store/db/indexes/openapi.yaml#/components/schemas/PathEdge"
    ForeignSource:
      type: object
      required:
        - type
        - dsn
        - postgres_table
      properties:
        type:
          type: string
          description: |
            Type of the foreign data source. Currently only "postgres" is supported.
          enum:
            - postgres
          example: "postgres"
        dsn:
          type: string
          description: |
            Data source name (connection string) for the foreign database.
            Supports `${secret:key_name}` references that resolve from the Antfly keystore
            or environment variables.
          example: "${secret:pg_dsn}"
        postgres_table:
          type: string
          description: |
            Name of the table or view in the foreign PostgreSQL database to query.
          example: "customers"
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ForeignColumn"
          description: |
            Optional column definitions for the foreign table. If omitted, columns are
            auto-discovered from `information_schema.columns` on first query.
    ForeignColumn:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Column name in the foreign table.
          example: "email"
        type:
          type: string
          description: |
            Column data type. Used for filter validation and type coercion.
            Common types: text, integer, bigint, float, boolean, timestamp, uuid, jsonb.
          example: "text"
        nullable:
          type: boolean
          description: Whether the column allows NULL values.
          default: false
    ReplicationSource:
      type: object
      required:
        - type
        - dsn
        - postgres_table
      properties:
        type:
          type: string
          description: |
            Type of the replication source. Currently only "postgres" is supported.
          enum:
            - postgres
          example: "postgres"
        dsn:
          type: string
          description: |
            Data source name (connection string) for the PostgreSQL database.
            Supports `${secret:key_name}` references that resolve from the Antfly keystore
            or environment variables. Requires `wal_level=logical` on the source.
          example: "${secret:pg_dsn}"
        postgres_table:
          type: string
          description: |
            Name of the table in the PostgreSQL database to replicate from.
          example: "users"
        key_template:
          type: string
          default: "id"
          description: |
            Template for constructing the Antfly document key from PG columns.
            A plain string (e.g., "id") uses that column's value directly.
            Use `{{column}}` syntax for composite keys: `{{tenant_id}}:{{user_id}}`.
          example: "id"
        slot_name:
          type: string
          description: |
            PostgreSQL replication slot name. If omitted, auto-derived from
            the Antfly table and PG table names. Specify this when using
            pre-created slots (e.g., on Supabase or Neon).
        publication_name:
          type: string
          description: |
            PostgreSQL publication name. If omitted, auto-derived and created
            automatically. Specify this when using pre-created publications.
        on_update:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationTransformOp"
          description: |
            Transform operations applied on INSERT/UPDATE events. Values can
            reference PG columns via `{{column}}` syntax. If omitted, auto-generates
            `$set` for every column (passthrough mode).
          example:
            - { op: "$set", path: "email", value: "{{user_email}}" }
            - { op: "$set", path: "score", value: "{{score}}" }
            - { op: "$merge", value: "{{metadata}}" }
            - { op: "$set", path: "active", value: true }
        on_delete:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationTransformOp"
          description: |
            Transform operations applied on DELETE events. If omitted, auto-derives
            `$unset` ops from `on_update`'s `$set` paths (safe for multi-source).
            Use `$delete_document` op to delete the entire Antfly document.
          example:
            - { op: "$set", path: "active", value: false }
        publication_filter:
          allOf:
            - $ref: "../../bleve-query-openapi.yaml#/components/schemas/Query"
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
          description: |
            Bleve-style filter query that gets translated to SQL and applied as a
            WHERE clause on the PostgreSQL publication. This filters rows at the
            source before they are sent over the replication stream, reducing
            network and processing overhead.

            Only a subset of filter types are supported (term, match, range,
            conjuncts, disjuncts, must_not). The filter is translated to SQL
            with inlined literal values.

            Example: `{"term": "active", "field": "status"}` becomes
            `WHERE ("status" = 'active')` on the publication.
        routes:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationRoute"
          description: |
            Conditional routes for fan-out replication. Each route evaluates its
            `where` filter against every CDC row and, on match, writes to the
            specified `target_table`. Multiple routes can match the same row.

            When routes are present, the top-level `on_update`/`on_delete` are
            ignored — each route defines its own transforms.
          example:
            - target_table: "premium_users"
              where: { "term": "premium", "field": "tier" }
            - target_table: "free_users"
              where: { "term": "free", "field": "tier" }
    ReplicationRoute:
      type: object
      required:
        - target_table
      properties:
        target_table:
          type: string
          description: |
            Name of the Antfly table to write matching rows to. The table must
            already exist.
          example: "premium_users"
        where:
          allOf:
            - $ref: "../../bleve-query-openapi.yaml#/components/schemas/Query"
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
          description: |
            Bleve-style filter query evaluated against each CDC row. Only rows
            matching this filter are written to `target_table`. If omitted,
            all rows match (equivalent to `match_all`).
        key_template:
          type: string
          description: |
            Override the source-level `key_template` for this route. If omitted,
            the source-level template is used.
          example: "{{tenant_id}}:{{user_id}}"
        on_update:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationTransformOp"
          description: |
            Transform operations for INSERT/UPDATE events on this route. If omitted,
            auto-generates `$set` for every column (passthrough mode).
        on_delete:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationTransformOp"
          description: |
            Transform operations for DELETE events on this route. If omitted,
            auto-derives from this route's `on_update` paths.
    ReplicationTransformOp:
      type: object
      required:
        - op
      properties:
        op:
          type: string
          description: |
            Transform operation. Standard ops: `$set`, `$unset`, `$inc`, `$push`, `$pull`,
            `$addToSet`, `$pop`, `$mul`, `$min`, `$max`, `$currentDate`, `$rename`.
            Replication-specific: `$merge` (flatten JSONB into top-level fields),
            `$delete_document` (delete entire Antfly doc, `on_delete` only).
          example: "$set"
        path:
          type: string
          description: Antfly document field path. Required for `$set`, `$unset`, etc.
          example: "email"
        value:
          description: |
            Value for the operation. Can be a literal (string, number, boolean)
            or a `{{column}}` reference to a PG column value. Use `{{col.key}}` to
            navigate into decoded JSONB columns.
  responses: # Add reusable responses
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  /status:
    get:
      summary: Get cluster status
      tags:
        - cluster_management
      description: Returns the current health and status of all stores and shards in the cluster
      operationId: getStatus
      responses:
        "200":
          description: Cluster status retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterStatus"
        "401":
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /secrets:
    get:
      summary: List secrets status
      tags:
        - cluster_management
      description: |
        List all configured secret names and their status (keystore, env var, or both).
        Never returns secret values — only names and configuration status.
      operationId: listSecrets
      responses:
        "200":
          description: Secret status list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretList"
        "401":
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /secrets/{key}:
    parameters:
      - name: key
        in: path
        required: true
        description: Secret key name (e.g., openai.api_key)
        schema:
          type: string
          pattern: "^[a-zA-Z0-9._-]+$"
    put:
      summary: Store a secret
      tags:
        - cluster_management
      description: |
        Store a secret in the keystore. Only available in swarm (single-node) mode.
        Returns 503 in multi-node mode.
      operationId: putSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretWriteRequest"
      responses:
        "200":
          description: Secret stored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable - secret management not available in multi-node mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a secret
      tags:
        - cluster_management
      description: |
        Remove a secret from the keystore. Only available in swarm (single-node) mode.
        Returns 503 in multi-node mode.
      operationId: deleteSecret
      responses:
        "204":
          description: Secret deleted successfully
        "401":
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Service unavailable - secret management not available in multi-node mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /batch:
    post:
      summary: Cross-table batch operations
      tags:
        - data_operations
      operationId: multiBatchWrite
      description: |
        Perform batch inserts, deletes, and transforms across multiple tables
        in a single atomic transaction.

        All operations across all tables are committed atomically using distributed
        2-phase commit (2PC). Either all operations succeed, or none do.

        **Use cases**:
        - Transfer records between tables (insert in one, delete from another)
        - Maintain referential integrity across tables
        - Atomic multi-table updates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiBatchRequest"
      responses:
        "201":
          description: Cross-table batch operation successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /transactions/commit:
    post:
      summary: Commit an OCC transaction
      tags:
        - data_operations
      operationId: commitTransaction
      description: |
        Commit a stateless OCC (Optimistic Concurrency Control) transaction.

        **Workflow**:
        1. Read documents using regular lookup endpoints, capturing the
           `X-Antfly-Version` response header for each read
        2. Compute writes locally based on the read values
        3. Submit this commit request with the read set (keys + versions)
           and the write set (batch operations per table)

        The server validates that all read versions still match current state.
        If any version has changed, the transaction is aborted with a 409 Conflict
        response containing details about which key conflicted.

        If all versions match, writes are executed atomically via 2PC.

        **No server-side state**: There is no "begin transaction" endpoint.
        The client manages its own read set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCommitRequest"
      responses:
        "200":
          description: Transaction committed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCommitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Transaction aborted due to version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCommitResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /backup:
    post:
      summary: Backup all tables or selected tables
      tags:
        - cluster_management
      description: |
        Creates a backup of all tables or specified tables. Each table's backup includes:
        - Table metadata (schema, indexes, shard configuration)
        - All shard data (compressed with zstd)

        The backup creates a cluster-level manifest that tracks all included tables
        and their individual backup locations.

        **Storage Locations:**
        - Local filesystem: `file:///path/to/backup`
        - Amazon S3: `s3://bucket-name/path/to/backup`

        **Backup Structure:**
        ```
        {location}/
        ├── {backup_id}-cluster-metadata.json   (cluster manifest)
        ├── {table1}-{backup_id}-metadata.json  (table metadata)
        ├── shard-1-{table1}-{backup_id}.tar.zst
        ├── shard-2-{table1}-{backup_id}.tar.zst
        ├── {table2}-{backup_id}-metadata.json
        └── ...
        ```
      operationId: backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterBackupRequest"
      responses:
        "200":
          description: Backup completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterBackupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /restore:
    post:
      summary: Restore multiple tables from a backup
      tags:
        - cluster_management
      description: |
        Restores tables from a cluster backup. Can restore all tables or a subset.

        **Restore Modes:**
        - `fail_if_exists`: Abort if any target table already exists (default)
        - `skip_if_exists`: Skip existing tables and restore the rest
        - `overwrite`: Drop existing tables and restore from backup

        The restore is asynchronous - this endpoint triggers the restore process
        and returns immediately. The actual data restoration happens via the
        reconciliation loop as shards are started.
      operationId: restore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterRestoreRequest"
      responses:
        "202":
          description: Restore triggered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterRestoreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /backups:
    get:
      summary: List available backups
      tags:
        - cluster_management
      description: |
        Lists all cluster-level backups available at the specified location.
        Returns metadata about each backup including the tables included,
        timestamp, and Antfly version.
      operationId: listBackups
      parameters:
        - name: location
          in: query
          required: true
          description: |
            Storage location to search for backups.
            - Local filesystem: `file:///path/to/backup`
            - Amazon S3: `s3://bucket-name/path/to/backup`
          schema:
            type: string
