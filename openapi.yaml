      operationId: linearMerge
      description: >
        Synchronize and keep Antfly in sync with external data sources like
        Shopify,

        Postgres, S3, or any sorted record source. Also known as: data
        synchronization,

        database sync, incremental sync, e-commerce sync.


        Both source and destination must be sorted by the same key. Performs
        three-way merge:

        - Inserts new records from source

        - Updates changed records

        - Deletes Antfly records absent from source page


        **Stateless & Idempotent**: No sync state between pages. Safe to restart

        from any page if interrupted.


        **Use Cases**: Sync production databases, e-commerce APIs (Shopify,
        WooCommerce),

        data lake exports, or warehouse tables to Antfly for low-latency hybrid
        search.


        **WARNING**: Not safe for concurrent merges with overlapping ranges.

        Single-client sync API only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinearMergeRequest'
