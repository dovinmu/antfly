            Rerankers use cross-encoder models that score query-document pairs
            directly,

            providing more accurate relevance scores than embedding similarity
            alone.


            **When to use:**

            - Results need high precision (e.g., RAG, question answering)

            - You have semantic or hybrid search results to refine

            - Latency trade-off is acceptable (reranking adds 100-500ms
            typically)


            **Best practice:** Retrieve more results (limit: 50-100) then rerank
            to final size.


            Example:

            ```json

            {
              "provider": "termite",
              "model": "cross-encoder/ms-marco-MiniLM-L-6-v2",
              "field": "content"
            }

            ```
