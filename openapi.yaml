      description: The embedding provider to use.
    EmbedderConfig:
      description: >-
        A unified configuration for an embedding provider.


        Embedders can be configured with templates to customize how documents
        are

        converted to text before embedding. Templates use Handlebars syntax and

        support various built-in helpers.


        **Template System:**

        - **Syntax**: Handlebars templating (https://handlebarsjs.com/guide/)

        - **Caching**: Templates are automatically cached with configurable TTL
        (default: 5 minutes)

        - **Context**: Templates receive the full document as context


        **Built-in Helpers:**


        1. **scrubHtml** - Remove script/style tags and extract clean text from
        HTML
           ```handlebars
           {{scrubHtml html_content}}
           ```
           - Removes `<script>` and `<style>` tags
           - Adds newlines after block elements (p, div, h1-h6, li, etc.)
           - Returns plain text with preserved readability

        2. **eq** - Equality comparison for conditionals
           ```handlebars
           {{#if (eq status "active")}}Active user{{/if}}
           {{#if (eq @key "special")}}Special field{{/if}}
           ```

        3. **media** - GenKit dotprompt media directive for multimodal content
           ```handlebars
           {{media url=imageDataURI}}
           {{media url=this.image_url}}
           {{media url="https://example.com/image.jpg"}}
           {{media url="s3://endpoint/bucket/image.png"}}
           {{media url="file:///path/to/image.jpg"}}
           ```

           **Supported URL Schemes:**
           - `data:` - Base64 encoded data URIs (e.g., `data:image/jpeg;base64,...`)
           - `http://` / `https://` - Web URLs with automatic content type detection
           - `file://` - Local filesystem paths
           - `s3://` - S3-compatible storage (format: `s3://endpoint/bucket/key`)

           **Automatic Content Processing:**
           - **Images**: Downloaded, resized (if needed), converted to data URIs
           - **PDFs**: Text extracted or first page rendered as image
           - **HTML**: Readable text extracted using Mozilla Readability

           **Security Controls:**
           Downloads are protected by content security settings (see Configuration Reference):
           - Allowed host whitelist
           - Private IP blocking (prevents SSRF attacks)
           - Download size limits (default: 100MB)
           - Download timeouts (default: 30s)
           - Image dimension limits (default: 2048px, auto-resized)

           See: https://antfly.io/docs/configuration#security--cors

        4. **encodeToon** - Encode data in TOON format (Token-Oriented Object
        Notation)
           ```handlebars
           {{encodeToon this.fields}}
           {{encodeToon this.fields lengthMarker=false indent=4}}
           {{encodeToon this.fields delimiter="\t"}}
           ```

           **What is TOON?**
           TOON is a compact, human-readable format designed for passing structured data to LLMs.
           It provides **30-60% token reduction** compared to JSON while maintaining high LLM
           comprehension accuracy.

           **Key Features:**
           - Compact syntax using `:` for key-value pairs
           - Array length markers: `tags[#3]: ai,search,ml`
           - Tabular format for uniform data structures
           - Optimized for LLM parsing and understanding
           - Maintains human readability

           **Benefits:**
           - **Lower API costs** - Reduced token usage means lower LLM API costs
           - **Faster responses** - Less tokens to process
           - **More context** - Fit more documents within token limits

           **Options:**
           - `lengthMarker` (bool): Add # prefix to array counts like `[#3]` (default: true)
           - `indent` (int): Indentation spacing for nested objects (default: 2)
           - `delimiter` (string): Field separator for tabular arrays (default: none, use `"\t"` for tabs)

           **Example output:**
           ```
           title: Introduction to Vector Search
           author: Jane Doe
           tags[#3]: ai,search,ml
           metadata:
             edition: 2
             pages: 450
           ```

           **Default in RAG:** TOON is the default format for document rendering in RAG queries.

           **References:**
           - TOON Specification: https://github.com/toon-format/toon
           - Go Implementation: https://github.com/alpkeskin/gotoon

        **Template Examples:**


        Document with metadata:

        ```handlebars

        Title: {{metadata.title}}

        Date: {{metadata.date}}

        Tags: {{#each metadata.tags}}{{this}}, {{/each}}


        {{content}}

        ```


        HTML content extraction:

        ```handlebars

        Product: {{name}}

        Description: {{scrubHtml description_html}}

        Price: ${{price}}

        ```


        Multimodal with image:

        ```handlebars

        Product: {{title}}

        {{media url=image}}

        Description: {{description}}

        ```


        Conditional formatting:

        ```handlebars

        {{title}}

        {{#if author}}By: {{author}}{{/if}}

        {{#if (eq category "premium")}}⭐ Premium Content{{/if}}

        {{body}}

        ```


        **Environment Variables:**

        - `GEMINI_API_KEY` - API key for Google AI

        - `OPENAI_API_KEY` - API key for OpenAI

        - `OPENAI_BASE_URL` - Base URL for OpenAI-compatible APIs

        - `OLLAMA_HOST` - Ollama server URL (e.g., http://localhost:11434)


        **Importing Pre-computed Embeddings:**


        You can import existing embeddings (from OpenAI, Cohere, or any
        provider) by including

        them directly in your documents using the `_embeddings` field. This
        bypasses the

        embedding generation step and writes vectors directly to the index.


        **Steps:**

        1. Create the index first with the appropriate dimension

        2. Write documents with `_embeddings: { "<indexName>":
        [...<embedding>...] }`


        **Example:**

        ```json

        {
          "title": "My Document",
          "content": "Document text...",
          "_embeddings": {
            "my_vector_index": [0.1, 0.2, 0.3, ...]
          }
        }

        ```


        **Use Cases:**

        - Migrating from another vector database with existing embeddings

        - Using embeddings generated by external systems

        - Importing pre-computed OpenAI, Cohere, or other provider embeddings

        - Batch processing embeddings offline before ingestion
      allOf:
        - oneOf:
            - $ref: '#/components/schemas/GoogleEmbedderConfig'
            - $ref: '#/components/schemas/VertexEmbedderConfig'
            - $ref: '#/components/schemas/OllamaEmbedderConfig'
            - $ref: '#/components/schemas/OpenAIEmbedderConfig'
            - $ref: '#/components/schemas/OpenRouterEmbedderConfig'
            - $ref: '#/components/schemas/BedrockEmbedderConfig'
            - $ref: '#/components/schemas/CohereEmbedderConfig'
            - $ref: '#/components/schemas/TermiteEmbedderConfig'
            - $ref: '#/components/schemas/AntflyEmbedderConfig'
        - properties:
            provider:
              $ref: '#/components/schemas/EmbedderProvider'
            multimodal:
              type: boolean
              description: >-
                Declare that this model supports non-text content (images,
                audio, video, PDFs),

                even if the model isn't in Antfly's built-in model registry yet.


                When `true`, Antfly treats the model as multimodal and will send
                binary content

                (images, audio, etc.) to the provider instead of extracting
                text. The provider's

                API is still responsible for accepting the content — this flag
                just tells Antfly

                not to strip it.


                Not needed for models already in the registry (e.g.,
                `multimodalembedding`,

                `gemini-embedding-2-preview`, `clip-*`, `clipclap`).


                **Example:**

                ```json

                {
                  "provider": "vertex",
                  "model": "some-future-multimodal-model",
                  "multimodal": true
                }

                ```
          required:
            - provider
      example:
        provider: openai
        model: text-embedding-3-small
    TextChunkOptions:
      type: object
      description: Options specific to text chunking.
      properties:
        target_tokens:
          type: integer
          description: Target number of tokens per chunk.
        overlap_tokens:
          type: integer
          description: >-
            Number of tokens to overlap between consecutive chunks. Helps
            maintain context across chunk boundaries. Only used by fixed-size
            chunkers.
        separator:
          type: string
          description: >-
            Separator string for splitting (e.g., '\n\n' for paragraphs). Only
            used by fixed-size chunkers.
    AudioChunkOptions:
      type: object
      description: Options specific to audio chunking.
      properties:
        window_duration_ms:
          type: integer
          description: >-
            Window duration in milliseconds for fixed-window audio chunking
            (default: 30000).
        overlap_duration_ms:
          type: integer
          description: 'Overlap duration in milliseconds between audio chunks (default: 0).'
    ChunkOptions:
      type: object
      description: >-
        Per-request configuration for chunking. All fields are optional -
        zero/omitted values use chunker defaults.
      properties:
        max_chunks:
          type: integer
          description: Maximum number of chunks to generate per document.
        threshold:
          type: number
          format: float
          description: Confidence threshold for model-based chunking (0.0-1.0).
        text:
          $ref: '#/components/schemas/TextChunkOptions'
        audio:
          $ref: '#/components/schemas/AudioChunkOptions'
    TermiteChunkerConfig:
      description: >
        Configuration for the Termite chunking provider.


        Termite is a centralized HTTP service that provides chunking with
        multi-tier caching.

        The model name maps to ONNX model directory names (similar to how Ollama
        works).


        **Chunking Models:**

        - fixed: Simple fixed-size chunking by token count (built-in, no ONNX
        required)

        - Any other name will attempt to load from models/chunkers/{name}/
        directory


        **Caching:**

        - L1: Memory cache with 2-minute TTL

        - L2: Persistent Pebble database

        - Singleflight deduplication for concurrent identical requests
      allOf:
        - $ref: '#/components/schemas/ChunkOptions'
        - type: object
          properties:
            api_url:
              type: string
              format: uri
              description: >-
                The URL of the Termite API endpoint (e.g.,
                'http://localhost:8080'). Can also be set via ANTFLY_TERMITE_URL
                environment variable.
              example: http://localhost:8080
            model:
              type: string
              description: >-
                The chunking model to use. Either 'fixed' for simple token-based
                chunking, or a model name from models/chunkers/{name}/.
              default: fixed
              example: fixed
          required:
            - model
      example:
        provider: termite
        api_url: http://localhost:8080
        model: fixed
        max_chunks: 50
        text:
          target_tokens: 500
          overlap_tokens: 50
          separator: |+


    AntflyChunkerConfig:
      description: |
        Configuration for the local Antfly chunking provider.

        This provider runs chunking directly within the storage node process,
        without requiring an external Termite service. It uses simple fixed-size
        tokenizer-based chunking with no caching overhead.

        **Use this when:**
        - Running single-node deployments (swarm mode)
        - You don't need embedding/chunk caching across nodes
        - You want minimal setup complexity

        **Use Termite instead when:**
        - Running multi-node clusters where caching reduces costs
        - You need ONNX-accelerated chunking models
        - You want persistent chunk/embedding caches
      allOf:
        - $ref: '#/components/schemas/ChunkOptions'
      example:
        provider: antfly
        max_chunks: 50
        text:
          target_tokens: 500
          overlap_tokens: 50
          separator: |+


    ChunkerProvider:
      type: string
      enum:
        - mock
        - termite
        - antfly
      description: The chunking provider to use.
    ChunkerConfig:
      description: A unified configuration for a chunking provider.
      allOf:
        - oneOf:
            - $ref: '#/components/schemas/TermiteChunkerConfig'
            - $ref: '#/components/schemas/AntflyChunkerConfig'
        - properties:
            provider:
              $ref: '#/components/schemas/ChunkerProvider'
            store_chunks:
              x-go-type-skip-optional-pointer: true
              type: boolean
              description: >-
                Controls whether chunk data is persisted to storage. When false
                (default), chunks are generated in memory and only embeddings
                are stored. When true, both chunks and embeddings are stored.
              default: false
            full_text_index:
              x-go-type-skip-optional-pointer: true
              type: object
              description: >
                Configuration for full-text indexing of chunks in Bleve.

                When present (even if empty), chunks will be stored with :cft:
                suffix and indexed in Bleve's _chunks field.

                When absent, chunks use :c: suffix and are only used for vector
                embeddings.
              additionalProperties: true
          required:
            - provider
      example:
        provider: termite
        model: fixed
        text:
          target_tokens: 500
          overlap_tokens: 50
    EmbeddingsIndexConfig:
      type: object
      description: >-
        Unified configuration for embeddings indexes. When sparse is true,
        creates a sparse vector index (SPLADE inverted index). When sparse is
        false (default), creates a dense vector index (HNSW). For dense indexes,
        dimension can be omitted if an embedder is configured — it will be
        auto-detected.
      properties:
        external:
          x-go-type-skip-optional-pointer: true
          type: boolean
          default: false
          description: >-
            When true, embeddings are supplied externally via _embeddings and
            the index does not derive prompts from a field or template.
        sparse:
          x-go-type-skip-optional-pointer: true
          type: boolean
          default: false
          description: >-
            When true, creates a sparse (SPLADE) inverted index. When false
            (default), creates a dense (HNSW) vector index.
        dimension:
          x-go-type-skip-optional-pointer: true
          type: integer
          minimum: 1
          description: >-
            Vector dimension for dense indexes. Can be omitted when an embedder
            is configured (auto-detected via probe). Ignored for sparse indexes.
        field:
          x-go-type-skip-optional-pointer: true
          type: string
          description: Field to extract embeddings from
        template:
          x-go-type-skip-optional-pointer: true
          type: string
          description: >-
            Handlebars template for generating prompts. See
            https://handlebarsjs.com/guide/ for more information.
          example: >-
            Hello, {{#if (eq Name "John")}}Johnathan{{else}}{{Name}}{{/if}}! You
            are {{Age}} years old.
        distance_metric:
          $ref: '#/components/schemas/DistanceMetric'
        mem_only:
          x-go-type-skip-optional-pointer: true
          type: boolean
          description: Whether to use in-memory only storage (dense only)
        embedder:
          description: Configuration for the embeddings plugin
          $ref: '#/components/schemas/EmbedderConfig'
        summarizer:
          description: Configuration for the summarizer plugin (dense only)
          $ref: '#/components/schemas/GeneratorConfig'
        chunker:
          description: >-
            Configuration for the chunking plugin. When specified, documents are
            automatically chunked at write time before indexing. (dense only)
          $ref: '#/components/schemas/ChunkerConfig'
        top_k:
          x-go-type-skip-optional-pointer: true
          type: integer
          minimum: 1
          default: 10
          description: Default number of results to return from search (sparse only)
        min_weight:
          x-go-type-skip-optional-pointer: true
          type: number
          format: float
          default: 0
          description: Minimum weight threshold for sparse vector entries (sparse only)
        chunk_size:
          x-go-type-skip-optional-pointer: true
          type: integer
          minimum: 64
          default: 1024
          description: Number of documents per posting list chunk (sparse only)
