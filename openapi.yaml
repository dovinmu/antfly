    ScanKeysRequest:
      type: object
      description: |
        Request to scan keys in a table within a key range.
        If no range is specified, scans all keys in the table.
      properties:
        from:
          type: string
          description: |
            Start of the key range to scan (exclusive by default).
            Can be a full key or a prefix. If not specified, starts from
            the beginning of the table.
          example: user:100
        to:
          type: string
          description: |
            End of the key range to scan (inclusive by default).
            Can be a full key or a prefix. If not specified, scans to
            the end of the table.
          example: user:200
        inclusive_from:
          type: boolean
          description: |
            If true, include keys matching 'from' in the results.
            Default: false (exclusive lower bound for pagination).
          default: false
        exclusive_to:
          type: boolean
          description: |
            If true, exclude keys matching 'to' from the results.
            Default: false (inclusive upper bound).
          default: false
        fields:
          type: array
          items:
            type: string
          description: |
            List of fields to include in each result. If not specified,
            only returns the key. Supports:
            - Simple fields: "title", "author"
            - Nested paths: "user.address.city"
            - Wildcards: "_chunks.*"
            - Exclusions: "-_chunks.*._embedding"
            - Special fields: "_embeddings", "_summaries", "_chunks"
          example:
            - title
            - author
            - metadata.tags
        filter_query:
          allOf:
            - $ref: '#/components/schemas/Query'
            - x-go-type: json.RawMessage
              x-go-type-import:
                path: encoding/json
          description: >
            Bleve query to filter documents. Only documents matching this query

            are included in results. Uses the sear library for efficient
            per-document

            matching without requiring a full index.


            Examples:

            - Status filtering: `{"query": "status:published"}`

            - Date ranges: `{"query": "created_at:>2023-01-01"}`

            - Field matching: `{"query": "category:technology"}`
        limit:
          type: integer
          minimum: 1
          description: |
            Maximum number of results to return. If not specified, returns all
            matching keys in the range. Useful for pagination or sampling.
          example: 100
    BatchRequest:
      type: object
      description: >
        Batch insert, delete, and transform operations in a single request.


        **Atomicity**:

        - **Single shard**: Operations are atomic within shard boundaries

        - **Multiple shards**: Uses distributed 2-phase commit (2PC) for atomic
        cross-shard writes


        **How distributed transactions work**:

        1. Metadata server allocates HLC timestamp and selects coordinator shard

        2. Coordinator writes transaction record, participants write intents

        3. After all intents succeed, coordinator commits transaction

        4. Participants are notified asynchronously to resolve intents

        5. Recovery loop ensures notifications complete even after coordinator
        failure


        **Performance**:

        - Single-shard batches: < 5ms latency

        - Cross-shard transactions: ~20ms latency

        - Intent resolution: < 30 seconds worst-case (via recovery loop)


        **Guarantees**:

        - All writes succeed or all fail (atomicity across all shards)

        - Coordinator failure is recoverable (new leader resumes notifications)

        - Idempotent resolution (duplicate notifications are safe)


        **Benefits**:

        - Reduces network overhead compared to individual requests

        - More efficient indexing (updates are batched)

        - Automatic distributed transactions when operations span shards


        The inserts are upserts - existing keys are overwritten, new keys are
        created.
      properties:
        inserts:
          type: object
          description: >
            Map of document IDs to document objects. Each key is the unique
            identifier for the document.


            Best practices:

            - Use consistent key naming schemes (e.g., "user:123",
            "article:456")

            - Key length affects storage and performance - keep them reasonably
            short

            - Keys are sorted lexicographically, so choose prefixes that support
            range scans
          additionalProperties:
            type: object
            description: Document object with arbitrary fields matching your table schema.
          example:
            user:123:
              name: John Doe
              email: john@example.com
              age: 30
              tags:
                - customer
                - premium
            user:456:
              name: Jane Smith
              email: jane@example.com
              age: 25
              tags:
                - customer
        deletes:
          type: array
          description: >
            Array of document IDs to delete. Documents are removed from all
            indexes.


            Notes:

            - Non-existent keys are silently ignored

            - Deletions are processed before inserts in the same batch

            - Keys are permanently removed from storage and indexes
          items:
            type: string
          example:
            - user:789
            - user:old_account
        transforms:
          type: array
          description: >
            Array of transform operations for in-place document updates using
            MongoDB-style operators.


            Transform operations allow you to modify documents without
            read-modify-write races:

            - Operations are applied atomically on the server

            - Multiple operations per document are applied in sequence

            - Supports numeric operations ($inc, $mul), array operations ($push,
            $pull), and more


            Common use cases:

            - Increment counters (views, likes, votes)

            - Update timestamps ($currentDate)

            - Manage arrays (add/remove tags, items)

            - Update nested fields without overwriting the entire document
          items:
            $ref: '#/components/schemas/Transform'
          example:
            - key: article:123
              operations:
                - op: $inc
                  path: $.views
                  value: 1
                - op: $currentDate
                  path: $.lastViewed
            - key: user:456
              operations:
                - op: $push
                  path: $.tags
                  value: vip
        sync_level:
          $ref: '#/components/schemas/SyncLevel'
      example:
        inserts:
          user:123:
            name: John Doe
            email: john@example.com
            age: 30
            tags:
              - customer
              - premium
          user:456:
            name: Jane Smith
            email: jane@example.com
            age: 25
            tags:
              - customer
        deletes:
          - user:789
          - user:old_account
    BatchResponse:
      type: object
      properties:
        inserted:
          type: integer
          description: Number of documents successfully inserted
        deleted:
          type: integer
          description: Number of documents successfully deleted
        transformed:
          type: integer
          description: Number of documents successfully transformed
    MultiBatchRequest:
      type: object
      description: >
        Cross-table batch operations in a single atomic transaction.


        Groups batch operations by table name. All operations across all tables

        are committed atomically using distributed 2-phase commit (2PC).


        **Atomicity**: Either all operations across all tables succeed, or none
        do.

        This enables use cases like transferring a record from one table to
        another,

        or maintaining referential integrity across tables.
      required:
        - tables
      properties:
        tables:
          type: object
          description: |
            Map of table names to batch operations for that table.
            Each entry follows the same format as a single-table BatchRequest.
          additionalProperties:
            $ref: '#/components/schemas/BatchRequest'
          example:
            users:
              inserts:
                user:123:
                  name: John Doe
                  email: john@example.com
            orders:
              inserts:
                order:456:
                  user_id: user:123
                  total: 99.99
        sync_level:
          $ref: '#/components/schemas/SyncLevel'
    MultiBatchResponse:
      type: object
      description: |
        Response for a cross-table batch operation. Contains per-table results.
      properties:
        tables:
          type: object
          description: Per-table batch results
          additionalProperties:
            $ref: '#/components/schemas/BatchResponse'
    TransactionReadItem:
      type: object
      description: >
        A key that was read as part of an OCC transaction, along with the
        version

        observed at read time. Used to detect conflicts at commit time.
      required:
        - table
        - key
        - version
      properties:
        table:
          type: string
          description: Table name the key belongs to
        key:
          type: string
          description: Document key that was read
        version:
          type: string
          description: |
            Version token observed at read time (from X-Antfly-Version header).
            Use "0" to assert the key did not exist at read time.
    TransactionCommitRequest:
      type: object
      description: >
        Stateless OCC (Optimistic Concurrency Control) transaction commit
        request.


        The client reads documents (capturing version tokens from the
        X-Antfly-Version

        response header on lookups), computes writes locally, then submits
        everything

        in this single commit request. The server validates that all read
        versions

        still match before executing writes atomically via 2PC.


        **No server-side state**: There is no "begin" endpoint. The client
        manages

        its own read set and submits the full transaction in one request.
      required:
        - read_set
        - tables
      properties:
        read_set:
          type: array
          description: >
            Set of keys that were read during the transaction, with their
            observed versions.

            The server verifies these versions still match before committing
            writes.
          items:
            $ref: '#/components/schemas/TransactionReadItem'
        tables:
          type: object
          description: >
            Write set: map of table names to batch operations, same format as
            MultiBatchRequest.tables.
          additionalProperties:
            $ref: '#/components/schemas/BatchRequest'
        sync_level:
          $ref: '#/components/schemas/SyncLevel'
    TransactionCommitResponse:
      type: object
      description: Result of an OCC transaction commit attempt.
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - committed
            - aborted
          description: Whether the transaction was committed or aborted due to a conflict
        conflict:
          type: object
          description: >-
            Details about the conflict that caused an abort (only present when
            status is "aborted")
          properties:
            table:
              type: string
              description: Table where the conflict was detected
            key:
              type: string
              description: Key that had a version mismatch
            message:
              type: string
              description: Human-readable conflict description
        tables:
          type: object
          description: Per-table batch results (only present when status is "committed")
          additionalProperties:
            $ref: '#/components/schemas/BatchResponse'
    BackupRequest:
