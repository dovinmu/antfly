  /query:
    post:
      summary: Perform a global query
      tags:
        - query_operations
      description: >
        Executes a query across all relevant tables and shards based on the
        query content.


        ## Query Examples


        **Full-text search:**

        ```json

        {
          "table": "wikipedia",
          "full_text_search": {"query": "body:computer"},
          "limit": 10
        }

        ```


        **Semantic search:**

        ```json

        {
          "table": "articles",
          "semantic_search": "artificial intelligence applications",
          "indexes": ["title_body_embedding"],
          "limit": 20
        }

        ```


        **Hybrid search (RRF):**

        ```json

        {
          "table": "products",
          "full_text_search": {"query": "laptop gaming"},
          "semantic_search": "high performance gaming computers",
          "indexes": ["product_embedding"],
          "filter_query": {"query": "+price:<2000 +in_stock:true"},
          "fields": ["name", "price", "description"],
          "limit": 15
        }

        ```


        **With filtering:**

        ```json

        {
          "table": "users",
          "filter_prefix": "tenant:acme:",
          "full_text_search": {"query": "active:true"},
          "exclusion_query": {"query": "status:deleted"},
          "limit": 50
        }

        ```


        **NDJSON format:**

        For bulk queries, send multiple queries as NDJSON with `Content-Type:
        application/x-ndjson`.

        Each line must end with `\n`:

        ```

        {"table":"wiki","semantic_search":"AI","indexes":["emb"],"limit":5}

        {"table":"docs","full_text_search":{"query":"tutorial"},"limit":10}

        ```
      operationId: globalQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
          application/x-ndjson:
            schema:
              type: string
      responses:
        '200':
          description: Query successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponses'
        '400':
          description: Invalid query request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BasicAuth: []
        - ApiKeyAuth: []
        - BearerAuth: []
