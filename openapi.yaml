    Transform:
      type: object
      required:
        - key
        - operations
      description: >
        In-place document transformation using MongoDB-style operators.
        Transforms are applied atomically

        at the storage layer, eliminating read-modify-write races.


        **Important:** Transform results are NOT validated against the table
