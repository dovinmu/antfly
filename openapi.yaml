          type: string
          description: >
            Optional Handlebars template string for rendering document content
            in RAG queries.

            Template has access to document fields via
            `{{this.fields.fieldName}}`.


            **Default**: Uses TOON (Token-Oriented Object Notation) format for
            30-60% token reduction:

            ```handlebars

            {{encodeToon this.fields}}

            ```


            **Available Helpers**:

            - `encodeToon` - Renders fields in compact TOON format with
            configurable options:
              - `lengthMarker` (bool): Add # prefix to array counts (default: true)
              - `indent` (int): Indentation spacing (default: 2)
              - `delimiter` (string): Field separator for tabular arrays
            - `scrubHtml` - Removes HTML tags and extracts text

            - `media` - Wraps data URIs for GenKit multimodal support

            - `eq` - Equality comparison for conditionals


            **Examples**:

            - Basic TOON: `{{encodeToon this.fields}}`

            - Compact TOON: `{{encodeToon this.fields lengthMarker=false
            indent=0}}`

            - Tabular data: `{{encodeToon this.fields delimiter="\t"}}`

            - Custom template: `Title: {{this.fields.title}}\nBody:
            {{this.fields.body}}`

            - Traditional format: `{{#each this.fields}}{{@key}}:
            {{this}}\n{{/each}}`


            TOON format produces compact, LLM-optimized output like:

            ```

            title: Introduction to Vector Search

            author: Jane Doe

            tags[#3]: ai,search,ml

            ```


            **References**:

            - TOON Specification: https://github.com/toon-format/toon

            - Go Implementation: https://github.com/alpkeskin/gotoon
          example: '{{encodeToon this.fields}}'
        pruner:
          $ref: '#/components/schemas/Pruner'
          description: >
            Optional result pruning configuration to filter low-relevance
            results.


            Pruning helps detect "elbows" in score distributions and removes

            results that are significantly worse than top matches.


            **Common patterns:**

            - RAG queries: Use `max_score_gap_percent: 30` to stop at quality
            drop-offs

            - Strict matching: Use `min_score_ratio: 0.7` for high-quality
            results only

            - Combine both for best results


            Example:

            ```json

            {
              "min_score_ratio": 0.5,
              "max_score_gap_percent": 25.0,
              "min_absolute_score": 0.3
            }

            ```
        join:
          $ref: '#/components/schemas/JoinClause'
          description: >
            Cross-table join configuration for combining results from multiple
            tables.


            Joins allow you to enrich query results with data from related
            tables,

            similar to SQL JOINs but optimized for distributed execution.


            **Join Types:**

            - `inner`: Only return rows that have matches in both tables

            - `left`: Return all rows from the primary table, with NULL for
            non-matching right rows

            - `right`: Return all rows from the joined table, with NULL for
            non-matching left rows


            **Join Strategies** (auto-selected based on table sizes):

            - `broadcast`: Small table broadcast to all shards (best for
            dimension tables < 10MB)

            - `index_lookup`: Batch key lookups using indexes (best for
            selective joins)

            - `shuffle`: Hash-partition both tables (best for large-large joins)


            **Example - Enrich orders with customer data:**

            ```json

            {
              "table": "orders",
              "full_text_search": {"query": "status:pending"},
              "join": {
                "right_table": "customers",
                "join_type": "inner",
                "on": {
                  "left_field": "customer_id",
                  "right_field": "id"
                },
                "right_filters": {
                  "filter_query": {"query": "tier:premium"}
                }
              },
              "fields": ["order_id", "amount", "customers.name", "customers.email"]
            }

            ```


            **Multi-way joins** (nested):

            ```json

            {
              "table": "orders",
              "join": {
                "right_table": "customers",
                "on": {"left_field": "customer_id", "right_field": "id"},
                "nested_join": {
                  "right_table": "addresses",
                  "on": {"left_field": "customers.address_id", "right_field": "id"}
                }
              }
            }

            ```


            **Performance Tips:**

            - Filter the driving table first to reduce join input size

            - Put the smaller table on the right side for broadcast joins

            - Use indexed fields in join conditions for index_lookup strategy

            - Limit result fields to reduce data transfer
        foreign_sources:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ForeignSource'
          description: >
            Map of table name to foreign data source configuration for
            query-time federated access.

            When a table name referenced in this query (or in a join's
            `right_table`) appears as a key

            here, the query is routed to the external database instead of Antfly
            shards.


            This enables joining Antfly search results with structured
            relational data (customer records,

            product catalogs, etc.) without ingesting that data into Antfly.


            **Supported operations on foreign tables:** filter_query, field
            selection, limit/offset.

            **Not supported:** full_text_search, semantic_search,
            graph_searches, aggregations, reranker.


            **Example - Join Antfly products with Postgres customers:**

            ```json

            {
              "table": "products",
              "full_text_search": {"query": "category:electronics"},
              "join": {
                "right_table": "pg_customers",
                "on": {"left_field": "customer_id", "right_field": "id"}
              },
              "foreign_sources": {
                "pg_customers": {
                  "type": "postgres",
                  "dsn": "${secret:pg_dsn}",
                  "postgres_table": "customers"
                }
              }
            }

            ```
