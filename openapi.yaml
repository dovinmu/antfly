    post:
      summary: Create a new table
      description: >
        Creates a new table with optional schema definition, indexes, and
        configuration.


        ## Use Cases


        **Simple table for unstructured data:**

        ```json

        {
          "num_shards": 1
        }

        ```


        **Table with full-text search:**

        ```json

        {
          "num_shards": 3,
          "schema": {
            "document_schemas": {
              "article": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "id": {
                      "type": "string",
                      "x-antfly-types": ["keyword"]
                    },
                    "title": {
                      "type": "string",
                      "x-antfly-types": ["text", "keyword"]
                    },
                    "body": {
                      "type": "string",
                      "x-antfly-types": ["text"]
                    }
                  },
                  "x-antfly-include-in-all": ["title", "body"]
                }
              }
            },
            "default_type": "article"
          },
          "indexes": {
            "search_idx": {
              "type": "full_text"
            }
          }
        }

        ```


        **Table with vector similarity search:**

        ```json

        {
          "num_shards": 5,
          "description": "Product catalog with semantic search",
          "schema": {
            "document_schemas": {
              "product": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "product_id": {
                      "type": "string",
                      "x-antfly-types": ["keyword"]
                    },
                    "name": {
                      "type": "string",
                      "x-antfly-types": ["text", "keyword"]
                    },
                    "description": {
                      "type": "string",
                      "x-antfly-types": ["text"]
                    },
                    "price": {
                      "type": "number",
                      "x-antfly-types": ["numeric"]
                    }
                  },
                  "x-antfly-include-in-all": ["name", "description"]
                }
              }
            },
            "default_type": "product"
          },
          "indexes": {
            "semantic_idx": {
              "type": "embeddings",
              "field": "description",
              "embedder": {
                "provider": "ollama",
                "model": "all-minilm",
                "url": "http://localhost:11434"
              }
            }
          }
        }

        ```


        ## Best Practices


        - Define schema for core fields to improve performance

        - Start with fewer shards for small datasets (1-3)

        - Use meaningful table names (e.g., "products", "users", "articles")

        - Consider adding both full-text and vector indexes for hybrid search
      tags:
