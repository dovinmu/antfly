components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: An error message
      required:
        - error
    SortDirection:
      type: boolean
      description: Sort direction for a single field. true = descending, false = ascending.
    SortField:
      type: object
      description: A single sort field with direction.
      required:
        - field
      properties:
        field:
          type: string
          description: The field name to sort by.
        desc:
          type: boolean
          default: false
          description: Sort direction. true = descending, false = ascending.
    ClusterHealth:
      type: string
      enum:
        - unknown
        - healthy
        - unhealthy
        - degraded
        - error
      description: Overall health status of the cluster
    ClusterStatus:
      type: object
      required:
        - health
      additionalProperties: true
      properties:
        health:
          $ref: '#/components/schemas/ClusterHealth'
        message:
          type: string
          description: Optional message providing details about the health status
        auth_enabled:
          type: boolean
          description: Indicates whether authentication is enabled for the cluster
          x-omitzero: false
        swarm_mode:
          type: boolean
          description: Indicates whether the cluster is running in single-node swarm mode
          x-omitzero: false
    SecretStatus:
      type: string
      enum:
        - configured_keystore
        - configured_env
        - configured_both
      description: Source of the secret configuration
    SecretEntry:
      type: object
      required:
        - key
        - status
      properties:
        key:
          type: string
          description: Secret name (e.g., openai.api_key)
        status:
          $ref: '#/components/schemas/SecretStatus'
        env_var:
          type: string
          description: Corresponding environment variable name (e.g., OPENAI_API_KEY)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecretList:
      type: object
      required:
        - secrets
      properties:
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretEntry'
    SecretWriteRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: Secret value (stored encrypted, never returned)
    ByteRange:
      type: array
      items:
        type: string
        format: byte
      minItems: 2
      maxItems: 2
    SyncLevel:
      type: string
      enum:
        - propose
        - write
        - full_text
        - enrichments
        - aknn
      default: propose
      description: >
        Synchronization level for batch operations:

        - "propose": Wait for Raft proposal acceptance (fastest, default)

        - "write": Wait for Pebble KV write

        - "full_text": Wait for full-text index WAL write

        - "enrichments": Pre-compute enrichments before Raft proposal
        (synchronous enrichment generation)

        - "aknn": Wait for vector index write with best-effort synchronous
        embedding (falls back to async on timeout, slowest, most durable)
    ShardConfig:
      type: object
      required:
        - byte_range
      properties:
        byte_range:
          $ref: '#/components/schemas/ByteRange'
    CreateTableRequest:
      type: object
      properties:
        num_shards:
          type: integer
          format: uint
          description: >
            Number of shards to create for the table. Data is partitioned across
            shards based on key ranges.


            **Sizing Guidelines:**

            - Small datasets (<100K docs): 1-3 shards

            - Medium datasets (100K-1M docs): 3-10 shards

            - Large datasets (>1M docs): 10+ shards


            More shards enable better parallelism but increase overhead. Choose
            based on expected data size and query patterns.


            **When to Add More Shards:**


            Antfly supports **online shard reallocation** without downtime. Add
            more shards when:

            - Individual shards exceed size thresholds (configurable)

            - Query latency increases due to large shard size

            - Need better parallelism for write-heavy workloads


            Use the internal `/reallocate` endpoint to trigger automatic shard
            splitting:

            ```bash

            POST /_internal/v1/reallocate

            ```


            This enqueues a reallocation request that the leader processes
            asynchronously, splitting

            large shards and redistributing data without service interruption.


            **Advantages over Elasticsearch:**

            - Automatic shard splitting (no manual reindexing required)

            - Online operation (no downtime)

            - Transparent to applications (keys remain accessible during
            reallocation)
          example: 3
        description:
          type: string
          maxLength: 500
          description: |
            Optional human-readable description of the table and its purpose.
            Useful for documentation and team collaboration.
          example: User profiles with embeddings for semantic search
        indexes:
          type: object
          description: >
            Map of index name to index configuration. Indexes enable different
            query capabilities:

            - Full-text indexes for BM25 search

            - Vector indexes for semantic similarity

            - Multimodal indexes for images/audio/video


            You can add multiple indexes to support different query patterns.
          additionalProperties:
            $ref: '#/components/schemas/IndexConfig'
          example:
            search_index:
              type: full_text
            embedding_index:
              type: embeddings
              dimension: 384
              embedder:
                provider: ollama
                model: all-minilm
        schema:
          description: >
            Optional schema definition specifying field types, primary key, and
            TTL configuration.

            While optional, defining a schema provides type safety, optimized
            indexing, and better search performance.


            **Schema Features:**

            - **Field Types**: Define document structure using JSON Schema with
            `x-antfly-types` extensions

            - **Document TTL**: Configure automatic expiration via
            `ttl_duration` and optional `ttl_field`

            - **Primary Keys**: Specify unique identifier fields

            - **Validation**: Enforce schema constraints on writes


            **TTL Example:**

            ```json

            {
              "ttl_duration": "7d",
              "ttl_field": "_timestamp",
              "document_schemas": {...}
            }

            ```


            See the Table Management documentation for comprehensive TTL
            configuration and use cases.
          $ref: '#/components/schemas/TableSchema'
        replication_sources:
          type: array
          items:
            $ref: '#/components/schemas/ReplicationSource'
          description: >
            PostgreSQL CDC replication sources. Streams INSERT/UPDATE/DELETE
            changes from

            PostgreSQL tables into this Antfly table via logical replication.


            Multiple sources can feed into a single table (e.g., `users` +
            `scores` → Antfly `users`).

            Each source uses `on_update`/`on_delete` transforms to control how
            PG events map to

            Antfly document operations. Requires `wal_level=logical` on the
            PostgreSQL source.
    AntflyType:
      type: string
      enum:
        - search_as_you_type
        - keyword
        - text
        - html
        - numeric
        - datetime
        - boolean
        - link
        - geopoint
        - geoshape
        - embedding
        - blob
    Table:
      type: object
      required:
        - name
        - shards
        - indexes
      properties:
        name:
          type: string
        description:
          type: string
          maxLength: 500
          description: Optional description of the table.
          example: Table for user data
        indexes:
          type: object
          additionalProperties:
            x-go-type-skip-optional-pointer: false
            $ref: '#/components/schemas/IndexConfig'
        shards:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ShardConfig'
        schema:
          $ref: '#/components/schemas/TableSchema'
        migration:
          description: >-
            Present only when the table is migrating between schema versions.
            Absent means the table is stable.
          $ref: '#/components/schemas/TableMigration'
        replication_sources:
          type: array
          items:
            $ref: '#/components/schemas/ReplicationSource'
          description: |
            PostgreSQL CDC replication sources configured for this table.
    TableMigration:
      x-go-type-skip-optional-pointer: false
      type: object
      description: >-
        Describes an in-progress schema migration. The table serves reads from
        read_schema while rebuilding full-text indexes for the new schema.
      required:
        - state
        - read_schema
      properties:
        state:
          type: string
          enum:
            - rebuilding
        read_schema:
          $ref: '#/components/schemas/TableSchema'
    AggregationType:
      type: string
      enum:
        - sum
        - avg
        - min
        - max
        - count
        - sumsquares
        - stats
        - cardinality
        - terms
        - range
        - date_range
        - histogram
        - date_histogram
        - geohash_grid
        - geo_distance
        - significant_terms
      description: |
        Type of aggregation to compute:
        - Metrics: sum, avg, min, max, count, sumsquares, stats, cardinality
        - Bucketing: terms, range, date_range, histogram, date_histogram
        - Geo: geohash_grid, geo_distance
        - Analytics: significant_terms
    AggregationRange:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the range bucket
        from:
          type: number
          format: float
          x-go-type: float64
          x-go-type-skip-optional-pointer: false
          description: Lower bound (inclusive)
        to:
          type: number
          format: float
          x-go-type: float64
          x-go-type-skip-optional-pointer: false
          description: Upper bound (exclusive)
    AggregationDateRange:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the date range bucket
        from:
          type: string
          x-go-type-skip-optional-pointer: false
          description: Start date (ISO 8601 or relative like "now-7d")
        to:
          type: string
          x-go-type-skip-optional-pointer: false
          description: End date (ISO 8601 or relative like "now")
    CalendarInterval:
      type: string
      enum:
        - minute
        - hour
        - day
        - week
        - month
        - quarter
        - year
      description: Calendar-aware interval for date_histogram aggregations
    DistanceUnit:
      type: string
      enum:
        - m
        - km
        - mi
        - ft
        - yd
      description: |
        Distance unit for geo aggregations:
        - m: meters
        - km: kilometers
        - mi: miles
        - ft: feet
        - yd: yards
    DistanceRange:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the distance range bucket
        from:
          type: number
          format: float
          x-go-type: float64
          x-go-type-skip-optional-pointer: false
          description: Minimum distance (inclusive)
        to:
          type: number
          format: float
          x-go-type: float64
          x-go-type-skip-optional-pointer: false
          description: Maximum distance (exclusive)
    SignificanceAlgorithm:
      type: string
      enum:
        - jlh
        - mutual_information
        - chi_squared
        - percentage
      description: |
        Algorithm for computing term significance:
        - jlh: JLH algorithm (default)
        - mutual_information: Mutual Information
        - chi_squared: Chi-squared test
